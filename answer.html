<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>解答入力</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; display: flex; justify-content: center; align-items: flex-start; }
  
  .content-box { 
    width: 90%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 25px 15px; border-radius: 20px; text-align: center; margin-top: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
  }

  h2 { color: #333; font-size: 18px; margin: 0 0 5px 0; }
  .q-number { font-size: 13px; color: #666; font-weight: bold; margin-bottom: 15px; }

  /* 文字入力用（謎1, 3, 4） */
  .text-input-area { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
  #answerInput { flex: 1; height: 45px; font-size: 18px; border: 2px solid #333; border-radius: 10px; text-align: center; outline: none; }

  /* 謎2専用：ドラッグ＆ドロップ */
  .drag-input-area { display: none; }
  .slots { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; background: #b0bec5; padding: 10px; border-radius: 10px; margin-bottom: 12px; }
  .slot { height: 42px; background: rgba(255,255,255,0.7); border: 2px dashed #455a64; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
  .pool { background: #cfd8dc; padding: 10px; border-radius: 12px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; min-height: 120px; }
  .chip { background: #fff; border: 2px solid #455a64; border-radius: 8px; padding: 8px 0; font-size: 12px; font-weight: bold; color: #263238; cursor: grab; user-select: none; touch-action: none; }

  .ok-btn { width: 70px; height: 45px; background: #333; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
  .submit-large-btn { display: none; width: 100%; padding: 14px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-bottom: 15px; }
  .back-btn { display: block; width: 100%; padding: 12px; background: #607d8b; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>

<div class="content-box">
  <h2>解答入力</h2>
  <div class="q-number" id="displayQNo">対象の資料: なし</div>
  
  <div class="text-input-area" id="textUi">
    <input id="answerInput" type="text" placeholder="キーワードを入力">
    <button class="ok-btn" onclick="checkTextAnswer()">OK</button>
  </div>

  <div class="drag-input-area" id="dragUi">
    <div class="slots">
      <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
    </div>
    <div class="pool" id="ansPool">
      <div class="chip">イノ</div><div class="chip">マチ</div><div class="chip">ハン</div><div class="chip">キタ</div><div class="chip">ライ</div>
      <div class="chip">ママ</div><div class="chip">セイ</div><div class="chip">テマ</div><div class="chip">ケト</div><div class="chip">クツ</div>
      <div class="chip">キー</div><div class="chip">アミ</div><div class="chip">ヒト</div><div class="chip">トカ</div><div class="chip">ニン</div>
    </div>
    <button class="submit-large-btn" id="dragSubmitBtn" onclick="checkDragAnswer()">この並びで回答する</button>
  </div>

  <button class="back-btn" onclick="location.href=lastPage">元の資料に戻る</button>
</div>

<script>
const lastPage = localStorage.getItem("returnPage") || "question1.html";
const qNoMatch = lastPage.match(/\d+/);
document.getElementById("displayQNo").innerText = `現在の対象：資料_0${qNoMatch ? qNoMatch[0] : '?'}`;

if(lastPage === "question2.html") {
  document.getElementById("textUi").style.display = "none";
  document.getElementById("dragUi").style.display = "block";
  document.getElementById("dragSubmitBtn").style.display = "block";
}

function checkTextAnswer() {
  const input = document.getElementById('answerInput').value.trim();
  if (lastPage === "question1.html" && input === "4965") { location.href = "back.html"; } 
  else if (lastPage === "question3.html" && input === "生徒会室") { location.href = "back.html"; } 
  else if (lastPage === "question4.html" && (input === "shift" || input === "SHIFT" || input === "!")) {
    location.href = "back_q4.html"; // 謎4専用画面へ
  } else { location.href = "fail.html"; }
}

function checkDragAnswer() {
  const slots = document.querySelectorAll(".slots .slot");
  let finalAns = "";
  slots.forEach(slot => { if(slot.children.length > 0) finalAns += slot.children[0].innerText; });
  if(finalAns === "セイトカイノクツキー") { location.href = "back.html"; } else { location.href = "fail.html"; }
}

// ドラッグ制御
let dragged = null;
document.addEventListener("dragstart", e => { if(e.target.classList.contains("chip")) dragged = e.target; });
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", e => {
  e.preventDefault();
  const slot = e.target.closest(".slot");
  const pool = e.target.closest("#ansPool");
  if(slot && slot.children.length === 0) slot.appendChild(dragged);
  else if(pool) pool.appendChild(dragged);
});
document.addEventListener("touchstart", e => { if(e.target.classList.contains("chip")) dragged = e.target; }, {passive:true});
document.addEventListener("touchend", e => {
  if(!dragged) return;
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const slot = target ? target.closest(".slot") : null;
  if(slot && slot.children.length === 0) slot.appendChild(dragged);
  else document.getElementById("ansPool").appendChild(dragged);
  dragged = null;
});
</script>
</body>
</html>
