<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマホメニュー</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
  
  /* 背景画像：マイナス値を指定して画像を上に持ち上げています */
  background: url("win10_haikei_01-810x450.jpg") no-repeat;
  background-position: center -100px; 
  background-size: cover;
  
  display: flex;
  flex-direction: column;
}

/* アイコンコンテナ */
.menu-container {
  display: flex;
  justify-content: center;
  gap: 5px;
  padding-top: 15px;
  width: 100%;
  z-index: 10;
}

.icon-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 24%;
  text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

.icon-image {
  width: 52px;
  height: 52px;
  background-color: rgba(255, 255, 255, 0.9);
  border: 1px solid #444;
  border-radius: 10px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 4px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.4);
}

.icon-image img {
  width: 32px;
  height: 32px;
}

.icon-label {
  color: white;
  font-weight: bold;
  font-size: 10px;
  text-shadow: 1px 1px 3px #000;
  text-align: center;
}

/* メインエリア：テキストを削除して空間にしました */
.main-content {
  flex-grow: 1;
}

/* タスクバー */
.taskbar {
  width: 100%;
  height: 45px;
  background: rgba(0, 0, 0, 0.85);
  color: white;
  display: flex;
  align-items: center;
  padding-left: 15px;
  font-size: 14px;
  backdrop-filter: blur(4px); /* 背景を少しぼかすとお洒落です */
}
</style>
</head>

<body>

<div class="menu-container">
  <a href="question1.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png" alt="folder">
    </div>
    <div class="icon-label">資料一覧</div>
  </a>

  <a href="answer.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/943/943147.png" alt="answer">
    </div>
    <div class="icon-label">回答する</div>
  </a>

  <a href="howtoplay.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png" alt="help">
    </div>
    <div class="icon-label">遊び方</div>
  </a>

  <a href="https://x.com" target="_blank" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png" alt="X">
    </div>
    <div class="icon-label">X</div>
  </a>
</div>

<div class="main-content"></div>

<div class="taskbar">
  🔍 検索
</div>

</body>
</html>
