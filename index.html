<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>メインメニュー</title>

<style>
body {
  margin: 0;
  height: 100vh;
  overflow: hidden;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  /* ラフ案の「はいけい①」を想定 */
  background: url("win10_haikei_01-810x450.jpg") no-repeat center center;
  background-size: cover;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* アイコンが並ぶコンテナ */
.menu-container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 50px;
  width: 100%;
}

/* 各アイコンのスタイル */
.icon-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100px;
  cursor: pointer;
  transition: transform 0.2s;
  text-decoration: none; /* リンクの下線を消す */
}

.icon-box:hover {
  transform: scale(1.1);
}

.icon-image {
  width: 70px;
  height: 70px;
  background-color: rgba(255, 255, 255, 0.9);
  border: 2px solid #333;
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  margin-bottom: 8px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}

.icon-image img {
  width: 45px;
  height: 45px;
}

.icon-label {
  color: white;
  font-weight: bold;
  font-size: 14px;
  text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
  text-align: center;
}

/* 下部の「はいけい①」エリア（仮） */
.footer-content {
  margin-top: auto;
  margin-bottom: 60px; /* タスクバーの上 */
  color: white;
  font-size: 24px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,1);
}

/* タスクバー */
.taskbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: rgba(34, 34, 34, 0.9);
  color: white;
  display: flex;
  align-items: center;
  padding-left: 15px;
  font-size: 14px;
  backdrop-filter: blur(5px);
}
</style>
</head>

<body>

<div class="menu-container">
  <a href="documents.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/716/716784.png" alt="folder">
    </div>
    <div class="icon-label">資料一覧</div>
  </a>

  <a href="answer.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/943/943147.png" alt="answer">
    </div>
    <div class="icon-label">回答する</div>
  </a>

  <a href="howtoplay.html" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png" alt="help">
    </div>
    <div class="icon-label">遊び方</div>
  </a>

  <a href="https://x.com" target="_blank" class="icon-box">
    <div class="icon-image">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png" alt="X">
    </div>
    <div class="icon-label">X</div>
  </a>
</div>

<div class="footer-content">
  メインコンテンツエリア
</div>

<div class="taskbar">
  🔍 検索
</div>

</body>
</html>
