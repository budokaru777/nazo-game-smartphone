<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>スマホメニュー</title>
<style>
  html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; font-family: sans-serif; }
  body {
    background: url("haikei.jpg") no-repeat center -80px/cover;
    display: flex; flex-direction: column;
  }
  .menu-container { display: flex; justify-content: center; gap: 8px; padding-top: 20px; z-index: 10; }
  .icon-box { display: flex; flex-direction: column; align-items: center; width: 22%; text-decoration: none; -webkit-tap-highlight-color: transparent; }
  .icon-image {
    width: 55px; height: 55px; background: rgba(255, 255, 255, 0.9); border: 1px solid #444; border-radius: 12px;
    display: flex; justify-content: center; align-items: center; margin-bottom: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }
  .icon-image img { width: 35px; height: 35px; }
  .icon-label { color: white; font-weight: bold; font-size: 11px; text-shadow: 1px 1px 4px #000; text-align: center; }
  
  .main-content { flex-grow: 1; }
  
  .taskbar { position: fixed; bottom: 0; width: 100%; height: 60px; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
  .search-form { width: 92%; display: flex; align-items: center; background: rgba(255, 255, 255, 0.15); border-radius: 20px; padding: 5px 15px; border: 0.5px solid rgba(255, 255, 255, 0.2); }
  .search-input { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; }
</style>
</head>
<body>

<div class="menu-container">
  <a href="documents.html" class="icon-box">
    <div class="icon-image"><img src="https://cdn-icons-png.flaticon.com/512/716/716784.png"></div>
    <div class="icon-label">資料一覧</div>
  </a>
  
  <a href="answer_menu.html" class="icon-box">
    <div class="icon-image"><img src="https://cdn-icons-png.flaticon.com/512/3503/3503827.png"></div>
    <div class="icon-label">回答する</div>
  </a>
  
  <a href="manual.html" class="icon-box">
    <div class="icon-image"><img src="https://cdn-icons-png.flaticon.com/512/1828/1828940.png"></div>
    <div class="icon-label">遊び方</div>
  </a>
  
  <a href="https://x.com" target="_blank" class="icon-box">
    <div class="icon-image"><img src="https://cdn-icons-png.flaticon.com/512/5968/5968958.png"></div>
    <div class="icon-label">X</div>
  </a>
</div>

<div class="main-content"></div>

<div class="taskbar">
  <form class="search-form" onsubmit="doSearch(event)">
    <button type="submit" style="background:none; border:none; color:white; font-size:18px;">🔍</button>
    <input type="text" id="searchInput" class="search-input" placeholder="Googleで検索..." autocomplete="off">
  </form>
</div>

<script>
// Google検索を実行する関数
function doSearch(event) {
  event.preventDefault();
  const query = document.getElementById('searchInput').value;
  if (query.trim() !== "") {
    window.open("https://www.google.com/search?q=" + encodeURIComponent(query), "_blank");
  }
}
</script>
</body>
</html>
