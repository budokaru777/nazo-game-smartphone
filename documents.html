<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料一覧</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; background: #f5f5f5; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; padding: 20px 10px; box-sizing: border-box; }
  
  .container { width: 100%; max-width: 400px; margin: 0 auto; background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 20px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box; }
  h2 { text-align: center; color: #333; margin-top: 0; font-size: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
  
  .doc-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  
  .doc-card { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); cursor: pointer; transition: transform 0.1s; }
  .doc-card:active { transform: scale(0.98); }
  
  .doc-icon { width: 50px; height: 50px; background: #e0f7fa; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 24px; margin-right: 12px; flex-shrink: 0; }
  .doc-info { flex-grow: 1; text-align: left; }
  .doc-file { font-size: 11px; color: #777; font-family: monospace; }
  .doc-title { font-size: 14px; font-weight: bold; color: #333; margin-top: 2px; }

  .back-btn { display: block; width: 100%; padding: 14px; background: #333; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; text-align: center; cursor: pointer; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>

<div class="container">
  <h2>手がかり資料一覧</h2>
  
  <div class="doc-list" id="documentList">
    </div>

  <button class="back-btn" onclick="location.href='index.html'">メインメニューに戻る</button>
</div>

<script>
// 現在プレイヤーが「どの謎（1〜6）」に挑戦しているかを取得（デフォルトは謎1）
const progress = parseInt(localStorage.getItem("gameProgress") || "1");
const documentList = document.getElementById("documentList");

// すべての資料のマスターリスト
const allFiles = [
  { name: "siryou1.png", title: "人物情報①", icon: "👤", availableFrom: 1 },
  { name: "siryou2.png", title: "ことねのスマホ内の写真", icon: "📱", availableFrom: 1 },
  { name: "siryou3.png", title: "ヌイニウム簡易報告資料", icon: "📄", availableFrom: 2 },
  { name: "siryou4.png", title: "人物情報②", icon: "👤", availableFrom: 2 },
  { name: "siryou5.png", title: "清夏のストーリー", icon: "📝", availableFrom: 2 },
  { name: "siryou6.png", title: "人物情報③", icon: "👤", availableFrom: 3 },
  { name: "siryou7.png", title: "生徒会スケジュール表1", icon: "📅", availableFrom: 3 },
  { name: "siryou8.png", title: "生徒会スケジュール表2", icon: "📅", availableFrom: 3 },
  { name: "siryou9.png", title: "生徒会企画資料", icon: "📁", availableFrom: 5 }, // 謎4クリア後（＝謎5開始時）から出現
  { name: "siryou10.png", title: "人物情報⑤", icon: "👤", availableFrom: 5 }
];

let htmlContent = "";

// 現在の進行度（progress）以下の資料をすべてループで回して生成
allFiles.forEach(file => {
  if (progress >= file.availableFrom) {
    htmlContent += `
      <div class="doc-card" onclick="viewDocument('${file.name}')">
        <div class="doc-icon">${file.icon}</div>
        <div class="doc-info">
          <div class="doc-file">${file.name}</div>
          <div class="doc-title">${file.title}</div>
        </div>
        <div style="color: #ccc; font-size: 18px;">➔</div>
      </div>
    `;
  }
});

if(htmlContent === "") {
  htmlContent = `<p style="text-align:center; color:#666; font-size:14px; padding:20px 0;">閲覧可能な資料がありません。</p>`;
}
documentList.innerHTML = htmlContent;

// 確実に画像表示用ページ（view_document.html）へ引き渡す処理
function viewDocument(fileName) {
  localStorage.setItem("returnPage", "documents.html");
  localStorage.setItem("viewingImage", fileName); // 確実にLocalStorageに書き込む
  location.href = "view_document.html";
}
</script>
</body>
</html>
