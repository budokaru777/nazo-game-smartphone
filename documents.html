<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>手がかり資料一覧</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 20px 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
  }

  h2 { color: #1a237e; font-size: 18px; margin: 0 0 15px 0; border-bottom: 2px solid #1a237e; padding-bottom: 5px; }

  /* 資料リスト全体のスタイル */
  .docs-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; text-align: left; }
  
  /* 各資料アイテム */
  .doc-card {
    background: #ffffff; border: 1px solid #c5e1a5; border-radius: 10px;
    padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    display: flex; align-items: center; justify-content: space-between;
    text-decoration: none; color: #333; transition: background 0.2s;
  }
  .doc-card:hover { background: #f1f8e9; }
  
  .doc-info { display: flex; flex-direction: column; gap: 2px; }
  .doc-filename { font-size: 11px; color: #757575; font-family: monospace; }
  .doc-title { font-size: 14px; font-weight: bold; color: #2e7d32; }
  
  /* 開くボタンマーク */
  .open-arrow { font-size: 16px; color: #81c784; font-weight: bold; }

  /* まだ解放されていない状態の表示 */
  .no-docs-msg { text-align: center; color: #999; font-size: 13px; padding: 20px 0; }

  .back-btn { display: block; width: 100%; padding: 12px; background: #607d8b; color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>

<div class="content-box">
  <h2>📄 手がかり資料一覧</h2>
  
  <div class="docs-list" id="documentsContainer"></div>

  <button class="back-btn" onclick="location.href='index.html'">メニューに戻る</button>
</div>

<script>
// 現在のゲーム進行度を取得（デフォルトは謎1の「1」）
const progress = parseInt(localStorage.getItem("gameProgress") || "1");

// 指定された資料の解放スケジュールデータ
const docData = [
  { stage: 1, files: [
    { name: "siryou1.png", desc: "人物情報①" },
    { name: "siryou2.png", desc: "ことねのスマホ内の写真" }
  ]},
  { stage: 2, files: [
    { name: "siryou3.png", desc: "ヌイニウム簡易報告資料" },
    { name: "siryou4.png", desc: "人物情報②" },
    { name: "siryou5.png", desc: "清夏のストーリー" }
  ]},
  { stage: 3, files: [
    { name: "siryou6.png", desc: "人物情報③" },
    { name: "siryou7.png", desc: "生徒会スケジュール表1" },
    { name: "siryou8.png", desc: "生徒会スケジュール表2" }
  ]},
  { stage: 4, files: [] }, // 謎4のタイミングでは新規追加なし
  { stage: 5, files: [
    { name: "siryou9.png", desc: "生徒会企画資料" },
    { name: "siryou10.png", desc: "人物情報⑤" }
  ]},
  { stage: 6, files: [] }  // 謎6のタイミングでは新規追加なし
];

let htmlContent = "";
let hasAnyDoc = false;

// 進行度に応じて、解放されている資料カードを生成
docData.forEach(group => {
  if (progress >= group.stage) {
    group.files.forEach(file => {
      hasAnyDoc = true;
      // 各画像ファイルに直接リンク（別タブか同タブで画像を開く設定）
      htmlContent += `
        <a href="${file.name}" target="_blank" class="doc-card">
          <div class="doc-info">
            <span class="doc-title">📄 ${file.desc}</span>
            <span class="doc-filename">${file.name}</span>
          </div>
          <div class="open-arrow">▶</div>
        </a>
      `;
    });
  }
});

// もし1つも解放されていない場合のフォールバック（基本的には謎1時点で2つ見られます）
if (!hasAnyDoc) {
  htmlContent = '<div class="no-docs-msg">現在利用可能な資料はありません。</div>';
}

document.getElementById("documentsContainer").innerHTML = htmlContent;
</script>

</body>
</html>
