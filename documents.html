<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>資料一覧</title>
<style>
  body { margin:0; padding:20px; font-family:sans-serif; background:url("haikei.jpg") center/cover fixed; }
  .file-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
  .file-item { text-align: center; cursor: pointer; text-decoration: none; color: white; text-shadow: 1px 1px 2px #000; }
  .file-item img { width: 60px; background: rgba(255,255,255,0.8); border-radius: 10px; padding: 5px; }
  .file-label { font-size: 12px; font-weight: bold; margin-top: 5px; }
</style>
</head>
<body>
<div class="file-grid" id="fileGrid"></div>

<script>
  // 進行度を取得（未プレイなら1）
  const progress = parseInt(localStorage.getItem("gameProgress") || 1);
  const grid = document.getElementById("fileGrid");

  for (let i = 1; i <= progress; i++) {
    if (i > 6) break; 
    const a = document.createElement("a");
    a.href = "question" + i + ".html";
    a.className = "file-item";
    a.innerHTML = `<img src="https://cdn-icons-png.flaticon.com/512/716/716784.png"><div class="file-label">資料${i}</div>`;
    grid.appendChild(a);
  }
</script>
</body>
</html>
