<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料2</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 15px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    max-height: 95vh; overflow-y: auto;
  }

  .q-title { font-size: 16px; font-weight: bold; color: #1a237e; margin: 5px 0; text-align: left; }
  .q-text { font-size: 13px; color: #333; text-align: left; margin-bottom: 10px; background: #f5f5f5; padding: 8px; border-radius: 8px; line-height: 1.4; }

  /* 答えを当てはめる5つの枠 */
  .answer-slots {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
    background: #d7ccc8; padding: 10px; border-radius: 10px; margin-bottom: 12px;
  }
  .slot {
    height: 40px; background: rgba(255,255,255,0.6); border: 2px dashed #795548;
    border-radius: 8px; display: flex; justify-content: center; align-items: center;
  }

  /* 新設：解答入力エリアのスタイル */
  .answer-input-area {
    background: #f5f5f5; border: 2px solid #333; border-radius: 15px;
    padding: 12px 10px; margin-bottom: 15px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  .input-label { font-size: 12px; font-weight: bold; color: #333; margin-bottom: 6px; text-align: left; padding-left: 5px; }
  .input-row { display: flex; justify-content: center; gap: 8px; }
  #answerInput { flex: 1; height: 40px; font-size: 16px; border: 2px solid #555; border-radius: 10px; text-align: center; outline: none; }
  .ok-btn { width: 65px; height: 40px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 3px 0 #1b5e20; }
  .ok-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1b5e20; }

  /* チップ置き場 */
  .chip-pool {
    background: #efebe9; padding: 10px; border-radius: 12px; margin-bottom: 12px;
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; min-height: 130px;
  }

  .chip {
    background: #fff; border: 2px solid #795548; border-radius: 8px;
    padding: 8px 0; font-size: 12px; font-weight: bold; color: #3e2723;
    cursor: grab; box-shadow: 0 3px 0 #d7ccc8; touch-action: none; user-select: none;
  }
  .chip.dragging { opacity: 0.4; }

  /* ヒントセクション（右寄せ） */
  .hint-section { display: flex; flex-direction: column; gap: 8px; text-align: right; }
  .hint-row { display: flex; flex-direction: row-reverse; align-items: center; gap: 8px; justify-content: flex-start; }
  .hint-icon { width: 38px; height: 38px; border-radius: 50%; background: #fff; border: 1px solid #ccc; overflow: hidden; flex-shrink: 0; display: flex; justify-content: center; align-items: center; }
  .hint-icon img { width: 100%; height: 100%; object-fit: cover; }
  .hint-btn { flex: 1; max-width: 110px; padding: 8px; border: 2px solid #607d8b; border-radius: 8px; background: white; color: #607d8b; font-size: 11px; font-weight: bold; cursor: pointer; }
  .bubble-msg { display: none; background: #75ef66; padding: 8px 12px; border-radius: 12px; font-size: 11px; color: #000; position: relative; max-width: 130px; text-align: left; }
  .bubble-msg::before { content: ""; position: absolute; right: -10px; top: 10px; border: 5px solid transparent; border-left: 10px solid #75ef66; }

  .ans-btn { width: 100%; background: #d32f2f !important; color: white !important; border: none !important; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 5px; }
  .back-menu-btn { display: block; width: 100%; padding: 10px; margin-top: 8px; background: #333; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>

<div class="content-box">
  <div class="q-title">謎２</div>
  <div class="q-text">３人の共通点は？上の5つの枠へドラッグして並べてみよう。</div>

  <div class="answer-slots">
    <div class="slot" data-slot="0"></div>
    <div class="slot" data-slot="1"></div>
    <div class="slot" data-slot="2"></div>
    <div class="slot" data-slot="3"></div>
    <div class="slot" data-slot="4"></div>
  </div>

  <div class="answer-input-area">
    <div class="input-label">🔑 キーワードを入力（スペースなし）：</div>
    <div class="input-row">
      <input id="answerInput" type="text" placeholder="答えを入力">
      <button class="ok-btn" onclick="checkAnswer()">OK</button>
    </div>
  </div>

  <div class="chip-pool" id="pool">
    <div class="chip" draggable="true">イノ</div><div class="chip" draggable="true">マチ</div><div class="chip" draggable="true">ハン</div><div class="chip" draggable="true">キタ</div><div class="chip" draggable="true">ライ</div>
    <div class="chip" draggable="true">ママ</div><div class="chip" draggable="true">セイ</div><div class="chip" draggable="true">テマ</div><div class="chip" draggable="true">ケト</div><div class="chip" draggable="true">クツ</div>
    <div class="chip" draggable="true">キー</div><div class="chip" draggable="true">アミ</div><div class="chip" draggable="true">ヒト</div><div class="chip" draggable="true">トカ</div><div class="chip" draggable="true">ニン</div>
  </div>

  <div class="hint-section">
    <div class="hint-row">
      <div class="hint-icon"><img src="seinan.png"></div>
      <button class="hint-btn" onclick="showBubble('h1')">ヒント1</button>
      <div id="h1" class="bubble-msg">三人のぬいぐるみ化前に注目してみましょう</div>
    </div>
    <div class="hint-row">
      <div class="hint-icon"><img src="hiro.png"></div>
      <button class="hint-btn" onclick="showBubble('h2')">ヒント2</button>
      <div id="h2" class="bubble-msg">みんながぬいぐるみになる前に共通して摂取してるものがないかな</div>
    </div>
    <div class="hint-row">
      <div class="hint-icon"><img src="riha.png"></div>
      <button class="hint-btn" onclick="showBubble('h3')">ヒント3</button>
      <div id="h3" class="bubble-msg">写真の情報から誰が作ったものかもわからないかな？</div>
    </div>
    <button class="ans-btn" onclick="askAnswer()">答えを見る</button>
  </div>

  <button class="back-menu-btn" onclick="location.href='index.html'">メニューに戻る</button>
</div>

<script>
localStorage.setItem("returnPage", "question2.html");

// 正解の文字列（プレイヤーが入力しやすいようにスペースなしでも判定できるようにします）
const correctAns1 = "セイトカイノクツキー";
const correctAns2 = "セイトカイノクツキー"; 

function checkAnswer() {
  // 入力された文字からスペースを除去し、大文字小文字（全角半角）を扱いやすくする処理
  const input = document.getElementById('answerInput').value.replace(/\s+/g, "").trim();
  
  if (input === correctAns1 || input === "セイトカイノクツキー") {
    // 正解：進行度を「3」に設定してback.htmlへ
    localStorage.setItem("gameProgress", "3");
    location.href = "back.html";
  } else {
    // 不正解：fail.htmlへ
    location.href = "fail.html";
  }
}

function showBubble(id) {
  document.querySelectorAll('.bubble-msg').forEach(b => b.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function askAnswer() {
  if(confirm("答えを見ますか？")) alert("答えは「セイ トカ イノ クツ キー」です！");
}

// --- ドラッグ＆ドロップ（PC・スマホ共通処理） ---
let dragged = null;
document.addEventListener("dragstart", e => { if(e.target.classList.contains("chip")) { dragged = e.target; e.target.classList.add("dragging"); } });
document.addEventListener("dragend", e => { if(e.target.classList.contains("chip")) { e.target.classList.remove("dragging"); } });
document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", e => {
  e.preventDefault();
  const slot = e.target.closest(".slot");
  const pool = e.target.closest("#pool");
  
  if(slot && slot.children.length === 0) {
    slot.appendChild(dragged);
  } else if(pool) {
    pool.appendChild(dragged);
  }
});

// スマホ用タッチ操作対応
document.addEventListener("touchstart", e => {
  if(e.target.classList.contains("chip")) { dragged = e.target; dragged.style.position = "static"; }
}, {passive:true});

document.addEventListener("touchend", e => {
  if(!dragged) return;
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  
  const slot = target ? target.closest(".slot") : null;
  const pool = target ? target.closest("#pool") : null;
  
  if(slot && slot.children.length === 0) {
    slot.appendChild(dragged);
  } else {
    document.getElementById("pool").appendChild(dragged);
  }
  dragged = null;
});
</script>
</body>
</html>
