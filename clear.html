<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GAME CLEAR!!</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { 
    background: url("haikei.jpg") no-repeat center top/cover; 
    background-attachment: fixed; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start; 
    padding: 30px 10px; 
    box-sizing: border-box; 
  }
  
  .content-box { 
    width: 100%; max-width: 380px; 
    background: rgba(255, 255, 255, 0.96); 
    padding: 30px 20px; 
    border-radius: 25px; 
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
    box-sizing: border-box;
    border: 3px solid #ffb300; /* 金色の豪華な枠線 */
  }

  h1 { 
    color: #ff9100; 
    font-size: 24px; 
    margin: 0 0 10px 0; 
    font-weight: bold; 
    text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 0 4px 8px rgba(0,0,0,0.2);
    animation: celebrate 1s ease-in-out infinite alternate;
  }
  @keyframes celebrate {
    0% { transform: scale(0.98); }
    100% { transform: scale(1.04); color: #ff3d00; }
  }

  .thank-text { 
    font-size: 14px; 
    color: #424242; 
    line-height: 1.6; 
    margin-bottom: 25px; 
    font-weight: bold; 
  }

  .fin-image-container {
    width: 100%;
    background: #fff;
    border-radius: 15px;
    padding: 8px;
    box-sizing: border-box;
    margin-bottom: 8px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
  }
  .fin-img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    display: block;
    animation: fadeInImg 1.5s ease-in-out;
  }
  @keyframes fadeInImg {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 画像保存の誘導アナウンス文 */
  .save-guide-text {
    font-size: 12px;
    color: #e65100;
    font-weight: bold;
    line-height: 1.4;
    margin-bottom: 25px;
  }

  /* ボタン共通スタイル */
  .btn-base {
    display: block; 
    width: 100%; 
    padding: 14px;
    font-size: 15px; 
    font-weight: bold; 
    color: white; 
    border: none; 
    border-radius: 12px;
    cursor: pointer; 
    text-decoration: none;
    box-sizing: border-box; 
    transition: all 0.1s;
    outline: none;
  }
  .btn-base:active { 
    transform: translateY(2px); 
  }

  /* X（旧Twitter）共有ボタン */
  .x-btn {
    background: #000000;
    box-shadow: 0 4px 0 #333333;
    margin-bottom: 12px;
  }
  .x-btn:active {
    box-shadow: 0 2px 0 #333333;
  }

  /* タイトルに戻るボタン */
  .restart-btn {
    background: linear-gradient(135deg, #ffb300, #ff6f00); 
    box-shadow: 0 4px 0 #b35c00;
  }
  .restart-btn:active { 
    box-shadow: 0 2px 0 #b35c00; 
  }
</style>
</head>
<body>

<div class="content-box">
  <h1>🎉 GAME CLEAR !! 🎉</h1>
  
  <div class="thank-text">
    無事にすべての謎を解き明かし、<br>
    ぬいぐるみ化の謎を解くことができました！<br>
    プレイしていただきありがとうございました！
  </div>
  
  <div class="fin-image-container">
    <img src="fin.png" class="fin-img" alt="THANK YOU FOR PLAYING!!">
  </div>

  <!-- 画像保存と共有を促す案内文を追加 -->
  <div class="save-guide-text">
    ※上の画像を長押しして保存し、<br>下のボタンからXに添付して共有しよう！
  </div>

  <button class="btn-base x-btn" onclick="shareClearOnX()">Xにクリアをポストする</button>

  <button class="btn-base restart-btn" onclick="resetAndGoHome()">タイトルメニューに戻る</button>
</div>

<script>
// 指定されたテキストとハッシュタグでXのポスト画面を開く処理
function shareClearOnX() {
  const tweetText = encodeURIComponent("すべての謎を解き明かしてゲームクリアしました！#まつよいちゃ謎解きBOOK");
  const tweetUrl = `https://twitter.com/intent/tweet?text=${tweetText}`;
  window.open(tweetUrl, "_blank");
}

function resetAndGoHome() {
  if (confirm("ゲームをクリア状態からリセットして、最初から遊び直しますか？")) {
    localStorage.setItem("gameProgress", "1");
    location.href = "index.html";
  }
}
</script>

</body>
</html>
