<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料1</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; display: flex; justify-content: center; align-items: flex-start; }
  
  .content-box { 
    width: 90%; 
    max-width: 380px; 
    background: rgba(255, 255, 255, 0.95); 
    padding: 20px 15px; 
    border-radius: 20px; 
    text-align: center; 
    margin-top: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  .hako-img { width: 100%; max-width: 280px; height: auto; margin-bottom: 15px; }

  /* 入力欄とOKボタンを横並びにする */
  .input-row { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    gap: 10px; 
    margin-bottom: 25px; 
  }
  #a { 
    flex: 1; 
    max-width: 180px; 
    height: 45px; 
    font-size: 20px; 
    border: 2px solid #333; 
    border-radius: 10px; 
    text-align: center; 
  }
  .ok-btn { 
    width: 60px; 
    height: 45px; 
    background: #333; 
    color: white; 
    border: none; 
    border-radius: 10px; 
    font-weight: bold; 
    cursor: pointer; 
  }

  /* ヒントセクションのレイアウト */
  .hint-section { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    text-align: left;
  }

  .hint-row { 
    display: flex; 
    align-items: center; 
    gap: 10px; 
    position: relative;
  }

  /* ヒントアイコン（丸） */
  .hint-icon { 
    width: 40px; 
    height: 40px; 
    border-radius: 50%; 
    background: #ddd; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    font-size: 12px; 
    font-weight: bold; 
    flex-shrink: 0;
    border: 1px solid #999;
  }

  /* ヒントを見るボタン */
  .hint-btn { 
    flex: 1; 
    max-width: 140px;
    padding: 10px; 
    border: 2px solid #607d8b; 
    border-radius: 8px; 
    background: white; 
    color: #607d8b; 
    font-size: 13px; 
    font-weight: bold; 
    cursor: pointer; 
  }

  /* LINE風吹き出し（右側に出る） */
  .bubble-msg { 
    display: none; 
    background: #75ef66; /* LINE風の緑色 */
    padding: 8px 12px; 
    border-radius: 12px; 
    font-size: 12px; 
    color: #000; 
    position: relative; 
    max-width: 120px;
    line-height: 1.3;
  }
  .bubble-msg::before {
    content: ""; position: absolute; left: -10px; top: 12px;
    border: 5px solid transparent; border-right: 10px solid #75ef66;
  }

  .ans-row { margin-top: 5px; }
  .ans-btn { width: 100%; background: #d32f2f !important; color: white !important; border: none !important; padding: 12px; }

</style>
</head>
<body>

<div class="content-box">
  <img src="hako.png" class="hako-img">

  <div class="input-row">
    <input id="a" type="text" placeholder="入力...">
    <button class="ok-btn" onclick="check()">OK</button>
  </div>

  <div class="hint-section">
    <div class="hint-row">
      <div class="hint-icon" style="background:#bbdefb;">リセ</div>
      <button class="hint-btn" onclick="showBubble('h1')">ヒント1を見る</button>
      <div id="h1" class="bubble-msg">6が3回だよ</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon" style="background:#c8e6c9;">ヒロ</div>
      <button class="hint-btn" onclick="showBubble('h2')">ヒント2を見る</button>
      <div id="h2" class="bubble-msg">ハホヘを見て</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon" style="background:#e1bee7;">セイ</div>
      <button class="hint-btn" onclick="showBubble('h3')">ヒント3を見る</button>
      <div id="h3" class="bubble-msg">あいうえお表！</div>
    </div>

    <div class="ans-row">
      <button class="hint-btn ans-btn" onclick="askAnswer()">答えを見る</button>
    </div>
  </div>
</div>

<script>
const correctAns = "4965"; // ラフ画に合わせて修正

function check() {
  const val = document.getElementById('a').value;
  if(val === correctAns) {
    localStorage.setItem("nextPage", "documents.html");
    location.href = "back.html";
  } else {
    location.href = "fail.html";
  }
}

// 吹き出しを表示する関数
function showBubble(id) {
  // 一旦全部消す
  document.querySelectorAll('.bubble-msg').forEach(b => b.style.display = 'none');
  // 指定したものだけ出す
  document.getElementById(id).style.display = 'block';
}

function askAnswer() {
  if(confirm("答えを見ますか？")) {
    alert("答えは " + correctAns + " です！");
  }
}
</script>

</body>
</html>
