<head>
<meta charset="UTF-8">

<title>正解</title>
<style>
  body { margin:0; height:100vh; background:url("haikei.jpg") center/cover; display:flex; justify-content:center; align-items:center; font-family:sans-serif; }
  .box { background:rgba(255,255,255,0.95); padding:25px; border-radius:15px; text-align:center; width:80%; max-width:350px; box-shadow:0 10px 20px rgba(0,0,0,0.3); }
  .clear-img { width:100%; border-radius:10px; margin-bottom:15px; }
  button { width:100%; padding:15px; font-size:18px; font-weight:bold; background:#4caf50; color:white; border:none; border-radius:10px; cursor:pointer; }
</style>
</head>
<body>
<div class="box">
  <img src="クリア画面.png" class="clear-img">
  <h2>正解！</h2>
  <p>新しい資料が追加されたようだ。</p>
  <button onclick="goNext()">資料一覧へ</button>
</div>
<script>
function goNext(){
  const lastPage = localStorage.getItem("returnPage") || "question1.html";
  const solvedNo = parseInt(lastPage.replace(/[^0-9]/g, ""));
  let prog = parseInt(localStorage.getItem("gameProgress") || 1);
  if(solvedNo >= prog) { localStorage.setItem("gameProgress", solvedNo + 1); }
  location.href = localStorage.getItem("nextPage") || "documents.html";
}
</script>
</body>

<body>

<div class="box">
  <img src="クリア画面.png" class="clear-img" alt="正解">
  <h2>正解だ！<br>本誌に戻って物語を進めよう。</h2>
  <button class="next-btn" onclick="goNext()">次へ進む</button>
</div>

<script>
function goNext() {
  // 現在の問題番号を取得（question1.htmlなら1）
  const lastPage = localStorage.getItem("returnPage") || "question1.html";
  const currentQNo = parseInt(lastPage.replace(/[^0-9]/g, "")) || 1;

  // 進行度を更新して資料一覧を解放
  let prog = parseInt(localStorage.getItem("gameProgress") || 1);
  if (prog <= currentQNo) {
    localStorage.setItem("gameProgress", currentQNo + 1);
  }

  // index.html（検索ページ）に戻る
  location.href = "index.html";
}
</script>
</body>
</html>
