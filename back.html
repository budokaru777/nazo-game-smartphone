<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>正解</title>
<style>
  body { 
    margin: 0; 
    height: 100vh; 
    background: url("haikei.jpg") no-repeat center/cover; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    font-family: sans-serif; 
  }
  
  .box { 
    background: rgba(255, 255, 255, 0.95); 
    padding: 25px 20px; 
    border-radius: 20px; 
    text-align: center; 
    width: 85%; 
    max-width: 360px; 
    box-shadow: 0 15px 35px rgba(0,0,0,0.4); 
    box-sizing: border-box;
  }

  .clear-img { 
    width: 100%; 
    height: auto;
    border-radius: 12px; 
    margin-bottom: 15px; 
  }

  h2 {
    color: #2e7d32;
    font-size: 22px;
    margin: 0 0 15px 0;
    font-weight: bold;
  }

  /* 警告・注意エリアのスタイル */
  .warning-box {
    background: #fff3e0;
    border: 2px solid #ff9800;
    border-radius: 12px;
    padding: 12px;
    margin-bottom: 20px;
    text-align: left;
  }

  .warning-title {
    color: #e65100;
    font-size: 14px;
    font-weight: bold;
    margin-bottom: 6px;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 4px;
  }

  .warning-text {
    font-size: 13px;
    color: #333;
    line-height: 1.5;
    margin: 0;
    font-weight: bold;
  }

  .highlight-red {
    color: #d32f2f;
    font-size: 14px;
    background: linear-gradient(transparent 60%, #ffcdd2 60%);
  }

  .next-btn { 
    width: 100%; 
    padding: 16px; 
    font-size: 16px; 
    font-weight: bold; 
    background: #4caf50; 
    color: white; 
    border: none; 
    border-radius: 12px; 
    cursor: pointer; 
    box-shadow: 0 5px 0 #388e3c;
    transition: all 0.1s;
    outline: none;
  }

  .next-btn:active { 
    transform: translateY(3px); 
    box-shadow: 0 2px 0 #388e3c; 
  }
</style>
</head>
<body>

<div class="box">
  <img src="クリア画面.png" class="clear-img" alt="正解">
  <h2>正解です！</h2>
  
  <div class="warning-box">
    <div class="warning-title">⚠️ 必ずお読みください</div>
    <p class="warning-text">
      ① ナゾが解けましたので、<span class="highlight-red">いったん本誌に戻って</span>物語を読み進めてください。<br><br>
      ② 新しく解放された資料は、<span class="highlight-red">本誌で次の謎ページに進むまで絶対に見てはいけません。</span>ネタバレに繋がる恐れがあります。
    </p>
  </div>

  <button class="next-btn" onclick="goNext()">確認して資料一覧へ</button>
</div>

<script>
function goNext() {
  // 元のページ情報から現在の問題番号を抽出
  const lastPage = localStorage.getItem("returnPage") || "question1.html";
  const currentQNo = parseInt(lastPage.replace(/[^0-9]/g, "")) || 1;

  // 進行度を1進める（現在の問題以上の進行度にする）
  let prog = parseInt(localStorage.getItem("gameProgress") || 1);
  if (prog <= currentQNo) {
    localStorage.setItem("gameProgress", currentQNo + 1);
  }

  // documents.html（資料一覧）へ戻る
  location.href = "documents.html";
}
</script>

</body>
</html>
