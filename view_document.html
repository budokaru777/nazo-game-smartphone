<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料閲覧</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #111; overflow: hidden; display: flex; flex-direction: column; font-family: sans-serif; }
  
  .header {
    background: #222;
    color: #fff;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #333;
    z-index: 10;
    box-sizing: border-box;
  }
  .header-title { font-size: 14px; font-weight: bold; font-family: monospace; color: #ccff00; }
  
  .back-btn {
    background: #d32f2f; color: #fff; border: none; padding: 8px 16px;
    border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: none;
  }

  /* 画像をスマホでもはみ出さずに綺麗に映すエリア */
  .image-container {
    flex-grow: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: auto;
    padding: 15px;
    background: #000;
  }
  
  .image-container img {
    max-width: 100%;
    max-height: 85vh;
    object-fit: contain;
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
    border-radius: 4px;
  }
</style>
</head>
<body>

  <div class="header">
    <div class="header-title" id="docNameDisplay">読み込み中...</div>
    <button class="back-btn" onclick="goBack()">閉じる</button>
  </div>

  <div class="image-container">
    <img id="targetImage" src="" alt="資料画像（ファイルが見つかりません）">
  </div>

<script>
// LocalStorageから選ばれたファイル名を捕まえる
const targetImgName = localStorage.getItem("viewingImage");
const returnPage = localStorage.getItem("returnPage") || "documents.html";

if (targetImgName) {
  // 画面上部のテキストをファイル名にする
  document.getElementById("docNameDisplay").innerText = targetImgName;
  // <img>タグのsrc属性にファイル名をぶち込んで写真を表示させる！
  document.getElementById("targetImage").src = targetImgName;
} else {
  document.getElementById("docNameDisplay").innerText = "エラー";
  alert("資料の情報が正しく引き継がれませんでした。一覧からもう一度選び直してください。");
}

function goBack() {
  location.href = returnPage;
}
</script>

</body>
</html>
