<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>元に戻った！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 25px 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
  }

  h2 { color: #2e7d32; font-size: 20px; margin: 0 0 5px 0; font-weight: bold; }
  .msg-text { font-size: 15px; color: #333; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }

  /* 画像2枚を重ねてフェードイン・フェードアウトさせる演出エリア */
  .evolution-container {
    position: relative;
    width: 100%;
    max-width: 280px;
    height: 320px;
    margin: 0 auto 20px auto;
    background: #f5f5f5;
    border-radius: 15px;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    overflow: hidden;
  }

  .evo-img {
    position: absolute;
    top: 10px;
    left: 10px;
    width: calc(100% - 20px);
    height: calc(100% - 20px);
    object-fit: contain;
    border-radius: 10px;
    transition: opacity 2s ease-in-out; /* 2秒かけてじんわり変化 */
  }

  /* 初期状態ではぬいぐるみが見えていて、後に消える */
  #nuiImg { opacity: 1; z-index: 2; }
  /* 初期状態では美鈴は隠れていて、後に浮き出る */
  #humanImg { opacity: 0; z-index: 1; }

  /* クラス付与時のアニメーション状態 */
  .fade-out { opacity: 0 !important; }
  .fade-in { opacity: 1 !important; }

  .clear-go-btn {
    display: block; width: 100%; padding: 14px;
    background: #1a237e; color: white; border: none; border-radius: 10px;
    font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none;
    box-sizing: border-box; box-shadow: 0 4px 0 #0d1348;
  }
  .clear-go-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0d1348; }
</style>
</head>
<body>

<div class="content-box">
  <h2>✨ 呪いが解けた！ ✨</h2>
  <div class="msg-text" id="statusMessage">美鈴に名前が届いている……！</div>
  
  <div class="evolution-container">
    <img id="nuiImg" src="misuzunui.png" class="evo-img" alt="ぬいぐるみ">
    <img id="humanImg" src="misuzu.png" class="evo-img" alt="ハタヤミスズ">
  </div>

  <button class="clear-go-btn" onclick="goToClear()">エンディングへ ▶</button>
</div>

<script>
// ページを開いて1秒後に、ぬいぐるみから人間への変身アニメーションを開始
setTimeout(() => {
  document.getElementById("nuiImg").classList.add("fade-out");
  document.getElementById("humanImg").classList.add("fade-in");
  document.getElementById("statusMessage").innerHTML = "<span style='color:#e91e63;'>秦谷美鈴</span>が元の姿に戻った！";
}, 1000);

function goToClear() {
  // 進行度をクリア状態にしてclear.htmlへ進む
  localStorage.setItem("gameProgress", "7");
  location.href = "clear.html";
}
</script>

</body>
</html>
