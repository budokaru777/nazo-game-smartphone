<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名前を呼び覚ませ！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; overflow: hidden; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    position: relative;
  }

  h2 { color: #d32f2f; font-size: 15px; margin: 0 0 5px 0; font-weight: bold; }
  .game-status { font-size: 11px; color: #333; margin-bottom: 10px; line-height: 1.4; background: #ffebee; padding: 6px; border-radius: 8px; font-weight: bold; }
  
  /* HUD（情報表示エリア） */
  .hud-area {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .hud-item {
    background: #263238;
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    margin: 0 4px;
    box-shadow: 0 3px 0 #10171a;
  }
  .hud-item span { color: #ffeb3b; font-size: 15px; }
  #missLabel { color: #ff5252; }

  /* ゲームステージ（4レーンの音ゲー筐体） */
  .game-stage {
    width: 100%;
    height: 400px;
    background: linear-gradient(to bottom, #050510, #101025);
    border: 3px solid #d32f2f;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 25px rgba(211,47,47,0.4);
    margin-bottom: 10px;
    user-select: none;
    touch-action: none;
  }

  /* 4つのレーンを区切る線 */
  .lanes-container {
    display: flex;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }
  .lane {
    flex: 1;
    height: 100%;
    border-right: 1px dashed rgba(255, 255, 255, 0.15);
    position: relative;
    box-sizing: border-box;
  }
  .lane:last-child { border-right: none; }

  /* プロセカ風の判定ライン（最下部付近） */
  .judgment-line {
    position: absolute;
    bottom: 50px;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #00ffff, #00e5ff);
    box-shadow: 0 0 12px #00ffff;
    pointer-events: none;
    z-index: 3;
  }

  /* レーン最下部のタップエリア（ボタン） */
  .lane-trigger {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 55px;
    background: rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    z-index: 4;
    cursor: pointer;
  }
  .lane-trigger:active, .lane-trigger.active {
    background: linear-gradient(to top, rgba(0, 229, 255, 0.4), rgba(0, 229, 255, 0));
  }

  /* 降ってくるノーツ（ブロック） */
  .note {
    position: absolute;
    width: 90%;
    left: 5%;
    height: 26px;
    border-radius: 6px;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: bold;
    box-sizing: border-box;
    z-index: 2;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
    pointer-events: none;
    background: linear-gradient(135deg, #00e676, #00b0ff);
    border: 2px solid #fff;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  /* 判定エフェクト（PERFECT / MISS） */
  .judgment-text {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 28px;
    font-weight: 900;
    font-style: italic;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }
  .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 15px #ffeb3b; animation: judAnim 0.3s ease-out forwards; }
  .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: judAnim 0.3s ease-out forwards; }

  @keyframes judAnim {
    0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
  }

  /* 開始前カウントダウンマスク */
  .start-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    border-radius: 9px;
  }
  .start-btn {
    padding: 15px 40px;
    background: #4caf50;
    color: white;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    box-shadow: 0 5px 0 #2e7d32;
    cursor: pointer;
  }
  .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .count-num { color: #fff; font-size: 60px; font-weight: bold; display: none; }
</style>
</head>
<body>

<div class="content-box">
  <h2>⚠️ 最終試練：美鈴の名前を呼び覚ませ！</h2>
  <div class="game-status">
    超高速で流れる<span style="color:#d32f2f;">「美鈴」</span>を正確に迎撃せよ！<br>
    ミスは2回まで。140個の超激流譜面を最後まで生き残れ！
  </div>

  <div class="hud-area">
    <div class="hud-item">PROGRESS: <span id="progressLabel">0</span> / 140</div>
    <div class="hud-item">MISS: <span id="missLabel">0</span> / 3</div>
  </div>

  <div class="game-stage" id="gameStage">
    <div class="start-overlay" id="overlay">
      <button class="start-btn" id="startBtn" onclick="startGame()">試練に挑む</button>
      <div class="count-num" id="countText">3</div>
    </div>

    <div class="judgment-text" id="judText">PERFECT</div>

    <div class="lanes-container">
      <div class="lane" id="lane0"><div class="lane-trigger" data-lane="0"></div></div>
      <div class="lane" id="lane1"><div class="lane-trigger" data-lane="1"></div></div>
      <div class="lane" id="lane2"><div class="lane-trigger" data-lane="2"></div></div>
      <div class="lane" id="lane3"><div class="lane-trigger" data-lane="3"></div></div>
    </div>
    
    <div class="judgment-line"></div>
  </div>
</div>

<script>
let totalSpawned = 0; 
let processedCount = 0; 
let missCount = 0;     
const MAX_MISS = 3;    
const TOTAL_NOTES = 140; 

let isPlaying = false;
let spawnInterval = null;
let activeNotes = [];
let animFrameId = null;

// 判定線のY座標（ステージ最上部が0、最下部が400px）
const JUDGE_LINE_Y = 346; 
const HIT_WINDOW = 35;    

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  const countText = document.getElementById("countText");
  countText.style.display = "block";
  
  let count = 3;
  countText.innerText = count;
  
  const cd = setInterval(() => {
    count--;
    if (count > 0) {
      countText.innerText = count;
    } else if (count === 0) {
      countText.innerText = "START!!";
    } else {
      clearInterval(cd);
      document.getElementById("overlay").style.display = "none";
      beginMainGame();
    }
  }, 800);
}

function beginMainGame() {
  isPlaying = true;
  totalSpawned = 0;
  processedCount = 0;
  missCount = 0;
  activeNotes = [];
  
  document.getElementById("progressLabel").innerText = "0";
  document.getElementById("missLabel").innerText = "0";

  // 【高難易度化】出現間隔を230ミリ秒に短縮（超高密度ラッシュ）
  spawnInterval = setInterval(() => {
    if (totalSpawned < TOTAL_NOTES) {
      spawnNote();
    } else {
      clearInterval(spawnInterval);
    }
  }, 230);

  animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
  if (!isPlaying) return;

  totalSpawned++;
  const laneIndex = Math.floor(Math.random() * 4);
  const targetLane = document.getElementById(`lane${laneIndex}`);

  const noteElement = document.createElement("div");
  noteElement.classList.add("note");
  noteElement.innerText = "美鈴"; // 【変更】文字を「美鈴」に固定

  let yPos = -30;
  noteElement.style.top = `${yPos}px`;
  targetLane.appendChild(noteElement);

  // 【高難易度化】落下速度を 4.8 ➔ 7.5 へ超大幅加速
  const speed = 7.5; 

  activeNotes.push({
    element: noteElement,
    lane: laneIndex,
    y: yPos,
    speed: speed
  });
}

function updateNotes() {
  if (!isPlaying) return;

  for (let i = activeNotes.length - 1; i >= 0; i--) {
    const note = activeNotes[i];
    note.y += note.speed;
    note.element.style.top = `${note.y}px`;

    if (note.y > 400) {
      note.element.remove();
      activeNotes.splice(i, 1);
      
      addMiss();
      checkGameEnd();
    }
  }
  
  if (isPlaying) {
    animFrameId = requestAnimationFrame(updateNotes);
  }
}

function judgeTap(laneIndex) {
  if (!isPlaying) return;

  let targetNoteIndex = -1;
  let maxY = -999;

  for (let i = 0; i < activeNotes.length; i++) {
    if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxY) {
      maxY = activeNotes[i].y;
      targetNoteIndex = i;
    }
  }

  if (targetNoteIndex !== -1) {
    const note = activeNotes[targetNoteIndex];
    const diff = Math.abs(note.y - (JUDGE_LINE_Y - 13)); 

    if (diff <= HIT_WINDOW) {
      note.element.remove();
      activeNotes.splice(targetNoteIndex, 1);

      showJudgment("PERFECT");
      processedCount++;
      document.getElementById("progressLabel").innerText = processedCount;
      checkGameEnd();
    }
  }
}

function addMiss() {
  missCount++;
  processedCount++;
  document.getElementById("missLabel").innerText = missCount;
  document.getElementById("progressLabel").innerText = processedCount;
  showJudgment("MISS");

  if (missCount >= MAX_MISS) {
    isPlaying = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrameId);
    
    setTimeout(() => {
      alert(`【試練失敗…】\n美鈴の濁流に圧倒され、ミスが${missCount}回に達してしまった！\n諦めずに指を動かし、もう一度挑戦しましょう！`);
      location.reload();
    }, 100);
  }
}

function checkGameEnd() {
  if (!isPlaying) return;

  if (processedCount >= TOTAL_NOTES && missCount < MAX_MISS) {
    isPlaying = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrameId);

    setTimeout(() => {
      alert(`【試練突破!!】\nこの神速譜面を僅か${missCount}ミスで凌ぎきるとは…！\n\n「美鈴……、美鈴っ！！」\n強く、激しく紡がれた名前の言霊が完全に響き渡り、ぬいぐるみが眩しく光りだした！`);
      location.href = "restore.html";
    }, 100);
  }
}

function showJudgment(type) {
  const judText = document.getElementById("judText");
  judText.className = "judgment-text"; 
  
  if (type === "PERFECT") {
    judText.innerText = "PERFECT";
    judText.classList.add("perfect");
  } else {
    judText.innerText = "MISS";
    judText.classList.add("miss");
  }
}

document.querySelectorAll(".lane-trigger").forEach(trigger => {
  const laneIndex = parseInt(trigger.dataset.lane);

  const handler = (e) => {
    e.preventDefault();
    trigger.classList.add("active");
    judgeTap(laneIndex);
    setTimeout(() => trigger.classList.remove("active"), 80);
  };

  trigger.addEventListener("touchstart", handler, { passive: false });
  trigger.addEventListener("mousedown", handler);
});
</script>

</body>
</html>
