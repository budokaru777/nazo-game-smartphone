<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名前を呼べ！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 25px 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
  }

  h2 { color: #d32f2f; font-size: 18px; margin: 0 0 10px 0; font-weight: bold; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.8; } }

  .game-status { font-size: 14px; color: #333; margin-bottom: 20px; line-height: 1.4; background: #ffebee; padding: 10px; border-radius: 10px; font-weight: bold; }
  
  /* カウンターの星マーク */
  .counter-display { font-size: 24px; color: #ffb300; margin: 15px 0; letter-spacing: 5px; }

  .input-area { background: #f5f5f5; border: 2px solid #d32f2f; border-radius: 15px; padding: 15px 10px; margin-bottom: 15px; }
  #nameInput { width: 100%; height: 45px; font-size: 18px; border: 2px solid #aaa; border-radius: 10px; text-align: center; outline: none; box-sizing: border-box; margin-bottom: 12px; }
  #nameInput:focus { border-color: #d32f2f; }

  .call-btn { width: 100%; padding: 14px; background: #d32f2f; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 0 #9a0007; }
  .call-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #9a0007; }
</style>
</head>
<body>

<div class="content-box">
  <h2>⚠️ 最終試練：呪いを解け！</h2>
  <div class="game-status">
    ぬいぐるみの本当の名前を<br><span style="color:#d32f2f; font-size:16px;">【 正しく 5回 】</span>呼びかけてください！
  </div>

  <div class="counter-display" id="starCounter">☆☆☆☆☆</div>

  <div class="input-area">
    <input id="nameInput" type="text" placeholder="名前を入力してください" autocomplete="off">
    <button class="call-btn" onclick="callName()">名前を呼ぶ！</button>
  </div>
</div>

<script>
let callCount = 0;

function callName() {
  const inputField = document.getElementById("nameInput");
  const val = inputField.value.trim();
  
  // 正解パターン（漢字・ひらがな・カタカナに対応）
  if (val === "秦谷美鈴" || val === "ハタヤミスズ" || val === "はたやみすず") {
    callCount++;
    
    // 星マークの表示を更新
    let stars = "";
    for(let i=0; i<5; i++) {
      stars += (i < callCount) ? "★" : "☆";
    }
    document.getElementById("starCounter").innerText = stars;
    
    // 入力欄をクリア
    inputField.value = "";
    
    if (callCount >= 5) {
      alert("「……、……っ！！」\nぬいぐるみの体が光りだした！");
      location.href = "restore.html"; // 演出ページへ移動
    } else {
      alert(`正しく呼びかけた！（${callCount}回目）`);
    }
  } else {
    alert("何も起きない。名前が間違っているようだ…");
    // 間違えたらカウントをリセット（難易度を下げるならリセットなしでもOK）
    callCount = 0;
    document.getElementById("starCounter").innerText = "☆☆☆☆☆";
  }
}
</script>

</body>
</html>
