<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>美鈴の試練 - SMARTPHONE FIXED -</title>
    <style>
        /* 画面全体の絶対固定（スクロールやバウンスを強制禁止） */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; background: #05020a;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        
        /* スマホの画面の高さ(100vh)に絶対に100%収めるコンテナ */
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100vh;
            max-width: 450px;
            margin: 0 auto;
            background: radial-gradient(circle at center, #160a2b 0%, #05020a 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 上部HUD（コンパクト化して高さを抑える） */
        .hud-area {
            display: flex;
            justify-content: space-between;
            padding: 10px 10px 5px 10px;
            z-index: 15;
            height: 50px;
            box-sizing: border-box;
        }
        .hud-card {
            background: rgba(25, 15, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 2px 8px;
            text-align: center;
            flex: 1;
            margin: 0 4px;
        }
        .hud-label { font-size: 9px; color: #8a99ad; font-weight: bold; }
        .hud-value { font-size: 14px; font-family: monospace; font-weight: 900; color: #fff; }
        #scoreValue { color: #00ffff; }

        /* 3D遠近感ステージ（画面中央から下部にかけて綺麗に配置） */
        .stage-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            perspective: 150px;
            perspective-origin: 50% 20%;
            box-sizing: border-box;
        }

        .game-stage {
            width: 100%;
            height: 100%;
            transform: rotateX(20deg);
            transform-origin: top center;
            position: relative;
            border-left: 2px solid rgba(0, 245, 255, 0.4);
            border-right: 2px solid rgba(0, 245, 255, 0.4);
            background: linear-gradient(to bottom, rgba(5,2,15,0.95) 0%, rgba(15,8,35,0.7) 60%, rgba(35,12,70,0.4) 100%);
        }

        /* レーンガイド */
        .lanes-container { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .lane { flex: 1; height: 100%; position: relative; border-right: 1px dashed rgba(0, 245, 255, 0.15); }
        .lane:last-child { border-right: none; }

        /* レーン発光エフェクト */
        .lane-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0, 245, 255, 0.3) 0%, rgba(0, 245, 255, 0) 80%);
            opacity: 0; pointer-events: none; z-index: 1;
        }
        .lane-flash.active { opacity: 1; }

        /* 固定配置される3D判定ライン */
        .judgment-line {
            position: absolute;
            bottom: 80px; /* 下部ボタンの上にジャスト配置 */
            left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
            box-shadow: 0 0 15px #00f5ff;
            pointer-events: none; z-index: 3;
        }

        /* 💎 プロセカ風の細長サイバーノーツ */
        .note {
            position: absolute; width: 94%; left: 3%; height: 12px;
            border-radius: 3px; box-sizing: border-box; z-index: 2; pointer-events: none;
            background: linear-gradient(90deg, #00f5ff, #00e676);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.7), inset 0 0 3px #fff;
            border: 1px solid #fff;
        }

        /* 🛑 一番重要：画面最下部に固定された「確実につぶせる」超高感度独立タップエリア */
        .touch-control-panel {
            display: flex;
            width: 100%;
            height: 110px; /* 親指で叩きやすいしっかりとした高さ */
            background: rgba(10, 5, 25, 0.85);
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .tap-button {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.01); /* 完全に透明 */
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(0, 245, 255, 0.1); /* スマホで叩いた時に一瞬光る */
        }
        .tap-button:last-child { border-right: none; }

        /* 判定テキスト演出 */
        .judgment-text {
            position: absolute; top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px; font-weight: 900; font-family: 'Impact', sans-serif;
            letter-spacing: 2px; pointer-events: none; z-index: 12; opacity: 0;
        }
        .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 15px #ff9800; animation: jAnim 0.2s ease-out forwards; }
        .judgment-text.great { color: #e1bee7; text-shadow: 0 0 8px #ba68c8, 0 0 15px #9c27b0; animation: jAnim 0.2s ease-out forwards; }
        .judgment-text.good { color: #b2dfdb; text-shadow: 0 0 8px #4db6ac; animation: jAnim 0.2s ease-out forwards; }
        .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: jAnim 0.2s ease-out forwards; }

        @keyframes jAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
        }

        /* 全画面スクリーンマスク（SHADE） */
        .SHADE {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 20px; box-sizing: border-box;
            background: rgba(8, 4, 18, 0.98);
        }
        #GameScoreLayer { display: none; }

        /* ボタンUI */
        .game-title { font-size: 18px; color: #fef002; font-weight: 900; margin-bottom: 12px; text-shadow: 0 0 10px rgba(254,240,2,0.4); text-align: center; }
        .game-desc { font-size: 12px; color: #ccc; line-height: 1.5; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; text-align: center; width: 100%; box-sizing: border-box; }
        
        .btn-phone {
            width: 80%; padding: 12px; margin: 6px 0;
            font-size: 15px; font-weight: bold; color: #fff; border: none; border-radius: 25px;
            cursor: pointer; box-sizing: border-box; text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #0077ff); box-shadow: 0 0 12px rgba(0,245,255,0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15); }
        
        .result-row { display: flex; justify-content: space-between; width: 75%; margin: 6px 0; font-size: 15px; color: #aaa; font-weight: bold; }
        .result-row span { color: #fff; font-family: monospace; font-size: 16px; }

        #countText { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 60px; font-weight: 900; color: #00f5ff; text-shadow: 0 0 15px #00f5ff; z-index: 18; display: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud-area">
        <div class="hud-card">
            <div class="hud-label">PROGRESS</div>
            <div class="hud-value"><span id="progressValue">0</span> / 100</div>
        </div>
        <div class="hud-card">
            <div class="hud-label">SCORE</div>
            <div class="hud-value"><span id="scoreValue">0</span> / 210</div>
        </div>
    </div>

    <div class="stage-wrapper">
        <div class="game-stage" id="mainStage">
            
            <div class="judgment-text" id="judText">PERFECT</div>

            <div class="lanes-container">
                <div class="lane" id="lane0"><div class="lane-flash" id="flash0"></div></div>
                <div class="lane" id="lane1"><div class="lane-flash" id="flash1"></div></div>
                <div class="lane" id="lane2"><div class="lane-flash" id="flash2"></div></div>
                <div class="lane" id="lane3"><div class="lane-flash" id="flash3"></div></div>
            </div>

            <div class="judgment-line" id="jLine"></div>
        </div>
    </div>

    <div class="touch-control-panel">
        <div class="tap-button" data-lane="0"></div>
        <div class="tap-button" data-lane="1"></div>
        <div class="tap-button" data-lane="2"></div>
        <div class="tap-button" data-lane="3"></div>
    </div>

    <div id="countText">3</div>

    <div id="welcome" class="SHADE">
        <div class="game-title">⚠️ 最終試練<br>美鈴の名前を呼び覚ませ！</div>
        <div class="game-desc">
            【画面サイズ固定化＆超高感度タップ版】<br><br>
            画面最下部の4つのレーン領域を<br>リズムに合わせてタップしてください！<br><br>
            <span style="color:#00f5ff;">Perf:3点 / Grt:2点 / Gd:1点</span><br>
            クリア目標：<span style="color:#fef002; font-weight:bold;">210点以上</span>
        </div>
        <button class="btn-phone btn-primary" onclick="tapStart()">試練を開始する</button>
    </div>

    <div id="GameScoreLayer" class="SHADE">
        <div class="game-title" id="resTitle">STAGE CLEAR</div>
        <div class="game-desc" id="resComment">素晴らしいリズム精度です！</div>
        
        <div class="result-row">獲得スコア: <span id="finalScore" style="color:#00ffff;">0</span></div>
        <div class="result-row">クリア基準: <span>210</span></div>
        <div class="result-row">自己ベスト: <span id="bestScore">0</span></div>

        <button class="btn-phone btn-primary" onclick="tapReplay()" style="margin-top:20px;">もう一度挑む</button>
        <button class="btn-phone btn-secondary" onclick="window.location.reload()">タイトルへ戻る</button>
    </div>
</div>

<script>
const TOTAL_NOTES = 100;
const TARGET_SCORE = 210;

let totalSpawned = 0;
let processedCount = 0;
let currentScore = 0;
let isPlaying = false;

let activeNotes = [];
let spawnInterval = null;
let animFrameId = null;

// CSS固定により、画面比率に関わらず正確に同期する内部位置座標
const STAGE_MAX_HEIGHT = window.innerHeight - 160; // 全体からHUDとタップエリアを引いた実質高
const JUDGE_POSITION_Y = STAGE_MAX_HEIGHT - 35;   // 判定ラインの固定Y座標
const HIT_WINDOW = 60; 

function tapStart() {
    document.getElementById('welcome').style.display = 'none';
    startCountdown();
}

function startCountdown() {
    const countText = document.getElementById("countText");
    countText.style.display = "block";
    let count = 3;
    countText.innerText = count;

    const cd = setInterval(() => {
        count--;
        if (count > 0) {
            countText.innerText = count;
        } else if (count === 0) {
            countText.innerText = "START!";
        } else {
            clearInterval(cd);
            countText.style.display = "none";
            beginGamePlay();
        }
    }, 600);
}

function beginGamePlay() {
    isPlaying = true;
    totalSpawned = 0;
    processedCount = 0;
    currentScore = 0;
    activeNotes = [];

    document.getElementById("progressValue").innerText = "0";
    document.getElementById("scoreValue").innerText = "0";

    // プロセカ風のハイスピードラッシュ生成
    spawnInterval = setInterval(() => {
        if (totalSpawned < TOTAL_NOTES) {
            spawnNote();
        } else {
            clearInterval(spawnInterval);
        }
    }, 230);

    animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
    if (!isPlaying) return;

    totalSpawned++;
    const laneIndex = Math.floor(Math.random() * 4);
    const targetLane = document.getElementById(`lane${laneIndex}`);

    const noteElement = document.createElement("div");
    noteElement.classList.add("note");
    noteElement.style.top = "-15px";
    targetLane.appendChild(noteElement);

    // どのスマホでも一定の快適な速度になるよう固定値を設定
    const speed = 12.0; 

    activeNotes.push({
        element: noteElement,
        lane: laneIndex,
        y: -15,
        speed: speed
    });
}

function updateNotes() {
    if (!isPlaying) return;

    for (let i = activeNotes.length - 1; i >= 0; i--) {
        const note = activeNotes[i];
        note.y += note.speed;
        note.element.style.top = note.y + "px";

        // 判定線を完全にスルーして下まで落ちた場合＝MISS
        if (note.y > STAGE_MAX_HEIGHT) {
            note.element.remove();
            activeNotes.splice(i, 1);
            
            showJudgment("MISS");
            processedCount++;
            document.getElementById("progressValue").innerText = processedCount;
            checkGameEnd();
        }
    }

    if (isPlaying) {
        animFrameId = requestAnimationFrame(updateNotes);
    }
}

// ボタンが押された時の即時判定処理（マルチタッチ＆マウスクリック共通）
function executeLaneTap(laneIndex) {
    if (!isPlaying) return;

    // レーン発光
    const flash = document.getElementById(`flash${laneIndex}`);
    flash.classList.remove("active");
    void flash.offsetWidth;
    flash.classList.add("active");
    setTimeout(() => { flash.classList.remove("active"); }, 70);

    let targetIndex = -1;
    let maxNoteY = -999;

    // 該当レーンの一番手前にあるノーツを特定
    for (let i = 0; i < activeNotes.length; i++) {
        if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxNoteY) {
            maxNoteY = activeNotes[i].y;
            targetIndex = i;
        }
    }

    if (targetIndex !== -1) {
        const note = activeNotes[targetIndex];
        const diff = Math.abs(note.y - JUDGE_POSITION_Y);

        // ミリ秒・ピクセルズレの許容範囲をスマホ用に最適化
        if (diff <= 25) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 3;
            showJudgment("PERFECT");
            pushProgress();
        } else if (diff <= 48) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 2;
            showJudgment("GREAT");
            pushProgress();
        } else if (diff <= HIT_WINDOW) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 1;
            showJudgment("GOOD");
            pushProgress();
        }
    }
}

function pushProgress() {
    processedCount++;
    document.getElementById("progressValue").innerText = processedCount;
    document.getElementById("scoreValue").innerText = currentScore;
    checkGameEnd();
}

function checkGameEnd() {
    if (!isPlaying) return;

    if (processedCount >= TOTAL_NOTES) {
        isPlaying = false;
        clearInterval(spawnInterval);
        cancelAnimationFrame(animFrameId);

        let localBest = localStorage.getItem("misuzu_fixed_best") || 0;
        if (currentScore > localBest) {
            localBest = currentScore;
            localStorage.setItem("misuzu_fixed_best", localBest);
        }

        setTimeout(() => {
            const scoreLayer = document.getElementById("GameScoreLayer");
            const title = document.getElementById("resTitle");
            const comment = document.getElementById("resComment");

            document.getElementById("finalScore").innerText = currentScore;
            document.getElementById("bestScore").innerText = localBest;

            if (currentScore >= TARGET_SCORE) {
                title.innerText = "🎉 試練突破 !!";
                title.style.color = "#00f5ff";
                comment.innerHTML = "「美鈴……、美鈴っ！！」<br>完全に響き渡った言霊の光が、世界を満たしていく！";
            } else {
                title.innerText = "❌ 試練失敗";
                title.style.color = "#ff8a80";
                comment.innerText = "クリア基準（210点）に届きませんでした。最下部のエリアをタイミングよく叩きましょう！";
            }

            scoreLayer.style.display = "flex";
        }, 400);
    }
}

function showJudgment(type) {
    const judText = document.getElementById("judText");
    judText.className = "judgment-text"; 
    judText.innerText = type;
    
    if (type === "PERFECT") judText.classList.add("perfect");
    else if (type === "GREAT") judText.classList.add("great");
    else if (type === "GOOD") judText.classList.add("good");
    else judText.classList.add("miss");
}

function tapReplay() {
    document.getElementById("GameScoreLayer").style.display = "none";
    startCountdown();
}

// 📱 スマホのブラウザ遅延を完全に殺すイベントリスナー登録
document.querySelectorAll(".tap-button").forEach(btn => {
    const laneIndex = parseInt(btn.dataset.lane);
    
    // タッチした瞬間に反応（スマホ用）
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    }, { passive: false });

    // クリックした瞬間に反応（PC開発環境・マウステスト用）
    btn.addEventListener("mousedown", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    });
});
</script>

</body>
</html>
