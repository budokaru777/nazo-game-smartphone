<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名前を呼び覚ませ！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; overflow: hidden; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    position: relative;
  }

  h2 { color: #d32f2f; font-size: 15px; margin: 0 0 5px 0; font-weight: bold; }
  .game-status { font-size: 11px; color: #333; margin-bottom: 10px; line-height: 1.4; background: #ffebee; padding: 6px; border-radius: 8px; font-weight: bold; }
  
  /* HUD（情報表示エリア） */
  .hud-area {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .hud-item {
    background: #263238;
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    margin: 0 4px;
    box-shadow: 0 3px 0 #10171a;
  }
  .hud-item span { color: #ffeb3b; font-size: 15px; }

  /* ゲームステージ（4レーンの音ゲー筐体） */
  .game-stage {
    width: 100%;
    height: 400px;
    background: linear-gradient(to bottom, #050510, #101025);
    border: 3px solid #d32f2f;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 25px rgba(211,47,47,0.4);
    margin-bottom: 10px;
    user-select: none;
    touch-action: none;
  }

  /* 4つのレーンを区切る線 */
  .lanes-container {
    display: flex;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }
  .lane {
    flex: 1;
    height: 100%;
    border-right: 1px dashed rgba(255, 255, 255, 0.15);
    position: relative;
    box-sizing: border-box;
  }
  .lane:last-child { border-right: none; }

  /* プロセカ風の判定ライン（最下部付近） */
  .judgment-line {
    position: absolute;
    bottom: 50px; /* タップエリアの少し上 */
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #00ffff, #00e5ff);
    box-shadow: 0 0 12px #00ffff;
    pointer-events: none;
    z-index: 3;
  }

  /* レーン最下部のタップエリア（ボタン） */
  .lane-trigger {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 55px;
    background: rgba(255, 255, 255, 0.05);
    border-top: 1px solid rgba(255, 255, 255, 0.3);
    z-index: 4;
    cursor: pointer;
  }
  .lane-trigger:active, .lane-trigger.active {
    background: linear-gradient(to top, rgba(0, 229, 255, 0.4), rgba(0, 229, 255, 0));
  }

  /* 降ってくるノーツ（ブロック） */
  .note {
    position: absolute;
    width: 90%;
    left: 5%;
    height: 26px;
    border-radius: 6px;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: bold;
    box-sizing: border-box;
    z-index: 2;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
    pointer-events: none; /* ノーツ自体ではなくレーンを叩かせる */
  }
  /* 正解ノーツ（緑） */
  .note.correct {
    background: linear-gradient(135deg, #00e676, #00b0ff);
    border: 2px solid #fff;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  /* 偽物ダミーノーツ（赤） */
  .note.dummy {
    background: linear-gradient(135deg, #ff1744, #f50057);
    border: 2px solid #ff8a80;
    color: #fff;
  }

  /* 判定エフェクト（PERFECT / MISS） */
  .judgment-text {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 28px;
    font-weight: uppercase;
    font-weight: 900;
    font-style: italic;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }
  .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 15px #ffeb3b; animation: judAnim 0.3s ease-out forwards; }
  .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: judAnim 0.3s ease-out forwards; }

  @keyframes judAnim {
    0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
  }

  /* 開始前カウントダウンマスク */
  .start-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    border-radius: 9px;
  }
  .start-btn {
    padding: 15px 40px;
    background: #4caf50;
    color: white;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    box-shadow: 0 5px 0 #2e7d32;
    cursor: pointer;
  }
  .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .count-num { color: #fff; font-size: 60px; font-weight: bold; display: none; }
</style>
</head>
<body>

<div class="content-box">
  <h2>⚠️ 最終試練：正しい名前を叩け！</h2>
  <div class="game-status">
    4レーンを流れる<span style="color:#d32f2f;">「秦谷」「美鈴」</span>を判定線で叩け！<br>
    20秒で140回成功でクリア！偽物はスルーせよ！
  </div>

  <div class="hud-area">
    <div class="hud-item">TIME: <span id="timeLabel">20.00</span>s</div>
    <div class="hud-item">HIT: <span id="scoreLabel">0</span> / 140</div>
  </div>

  <div class="game-stage" id="gameStage">
    <div class="start-overlay" id="overlay">
      <button class="start-btn" id="startBtn" onclick="startGame()">試練に挑む</button>
      <div class="count-num" id="countText">3</div>
    </div>

    <div class="judgment-text" id="judText">PERFECT</div>

    <div class="lanes-container">
      <div class="lane" id="lane0"><div class="lane-trigger" data-lane="0"></div></div>
      <div class="lane" id="lane1"><div class="lane-trigger" data-lane="1"></div></div>
      <div class="lane" id="lane2"><div class="lane-trigger" data-lane="2"></div></div>
      <div class="lane" id="lane3"><div class="lane-trigger" data-lane="3"></div></div>
    </div>
    
    <div class="judgment-line"></div>
  </div>
</div>

<script>
let score = 0;
let timeLeft = 20.00;
let isPlaying = false;
let gameTimer = null;
let spawnInterval = null;
let activeNotes = [];

const correctNames = ["秦谷", "美鈴"];
const dummyNames = ["泰谷", "秦の谷", "美寿々", "美鈴々", "ハタヤ", "ミスズ", "秦名", "三鈴"];

// 判定線のY座標に関する設定（ステージ最上部が0、最下部が400px）
const JUDGE_LINE_Y = 346; // ノーツの下辺がここに重なる瞬間
const HIT_WINDOW = 35;    // 前後何ピクセルまでPERFECTとするか

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  const countText = document.getElementById("countText");
  countText.style.display = "block";
  
  let count = 3;
  countText.innerText = count;
  
  const cd = setInterval(() => {
    count--;
    if (count > 0) {
      countText.innerText = count;
    } else if (count === 0) {
      countText.innerText = "START!!";
    } else {
      clearInterval(cd);
      document.getElementById("overlay").style.display = "none";
      beginMainGame();
    }
  }, 800);
}

function beginMainGame() {
  isPlaying = true;
  score = 0;
  timeLeft = 20.00;
  activeNotes = [];

  const startTime = Date.now();
  gameTimer = setInterval(() => {
    const elapsed = (Date.now() - startTime) / 1000;
    timeLeft = Math.max(0, 20.00 - elapsed);
    document.getElementById("timeLabel").innerText = timeLeft.toFixed(2);
    
    if (timeLeft <= 0) {
      endGame();
    }
  }, 10);

  // 20秒間で約150〜160個降らせるため、超高速（120ミリ秒ごと）にノーツを生成
  spawnInterval = setInterval(spawnNote, 120);

  // ノーツを動かすアニメーションループ
  requestAnimationFrame(updateNotes);
}

// ノーツ生成
function spawnNote() {
  if (!isPlaying) return;

  const laneIndex = Math.floor(Math.random() * 4);
  const targetLane = document.getElementById(`lane${laneIndex}`);

  const noteElement = document.createElement("div");
  noteElement.classList.add("note");

  // 55%の確率で正解ノーツ、45%でダミーノーツ
  const isCorrect = Math.random() < 0.55;
  if (isCorrect) {
    noteElement.classList.add("correct");
    noteElement.innerText = correctNames[Math.floor(Math.random() * correctNames.length)];
  } else {
    noteElement.classList.add("dummy");
    noteElement.innerText = dummyNames[Math.floor(Math.random() * dummyNames.length)];
  }

  // 初期位置（画面上部外側）
  let yPos = -30;
  noteElement.style.top = `${yPos}px`;
  targetLane.appendChild(noteElement);

  // 速度（プロセカのノーツスピード調整。約1秒弱で下まで届く速度）
  const speed = 5.2; 

  activeNotes.push({
    element: noteElement,
    lane: laneIndex,
    isCorrect: isCorrect,
    y: yPos,
    speed: speed
  });
}

// ノーツの落下・移動と自動ミス処理
function updateNotes() {
  if (!isPlaying) return;

  for (let i = activeNotes.length - 1; i >= 0; i--) {
    const note = activeNotes[i];
    note.y += note.speed;
    note.element.style.top = `${note.y}px`;

    // 判定ラインを完全に通り過ぎて画面外（最下部400px）に落ちた場合
    if (note.y > 400) {
      note.element.remove();
      activeNotes.splice(i, 1);

      // 正解ノーツだった場合はスルーしたら「MISS」
      if (note.isCorrect) {
        showJudgment("MISS");
      }
      // 偽物ノーツはスルーするのが正解なのでペナルティなし
    }
  }
  requestAnimationFrame(updateNotes);
}

// レーンタップ時の判定処理
function judgeTap(laneIndex) {
  if (!isPlaying) return;

  // タップされたレーンにあるノーツの中で、一番下（判定線に近いもの）を探す
  let targetNoteIndex = -1;
  let maxY = -999;

  for (let i = 0; i < activeNotes.length; i++) {
    if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxY) {
      maxY = activeNotes[i].y;
      targetNoteIndex = i;
    }
  }

  // レーン内にノーツが存在した場合
  if (targetNoteIndex !== -1) {
    const note = activeNotes[targetNoteIndex];
    const diff = Math.abs(note.y - (JUDGE_LINE_Y - 13)); // ノーツ中心点と判定線の差

    if (diff <= HIT_WINDOW) {
      // タイミングバッチリの場合
      note.element.remove();
      activeNotes.splice(targetNoteIndex, 1);

      if (note.isCorrect) {
        score++;
        document.getElementById("scoreLabel").innerText = score;
        showJudgment("PERFECT");
      } else {
        // 偽物ブロックを叩いた場合はお邪魔ペナルティでMISS扱い
        showJudgment("MISS");
      }
    }
  }
}

// 判定文字エフェクト表示
function showJudgment(type) {
  const judText = document.getElementById("judText");
  judText.className = "judgment-text"; // クラスリセット
  
  if (type === "PERFECT") {
    judText.innerText = "PERFECT";
    judText.classList.add("perfect");
  } else {
    judText.innerText = "MISS";
    judText.classList.add("miss");
  }
}

// イベントリスナー設定（4つのレーンへのマルチタッチ・クリック仕込み）
document.querySelectorAll(".lane-trigger").forEach(trigger => {
  const laneIndex = parseInt(trigger.dataset.lane);

  const handler = (e) => {
    e.preventDefault();
    trigger.classList.add("active");
    judgeTap(laneIndex);
    setTimeout(() => trigger.classList.remove("active"), 80);
  };

  trigger.addEventListener("touchstart", handler, { passive: false });
  trigger.addEventListener("mousedown", handler);
});

// ゲーム終了処理
function endGame() {
  isPlaying = false;
  clearInterval(gameTimer);
  clearInterval(spawnInterval);

  // 残ったノーツの全消去
  activeNotes.forEach(n => n.element.remove());
  activeNotes = [];

  setTimeout(() => {
    if (score >= 140) {
      alert(`【試練突破!!】\n記録: ${score}回パーフェクト！\n\n「……、……っ！！」\n完璧なリズムの言霊が響き渡り、ぬいぐるみが眩しく光りだした！`);
      location.href = "restore.html";
    } else {
      alert(`【タイムアップ…】\nクリア判定数: ${score}回\n\nリズムが乱れて呪いを解除できなかった！140回まであと${140 - score}回足りません！\nもう一度挑戦しましょう！`);
      location.reload();
    }
  }, 100);
}
</script>

</body>
</html>
