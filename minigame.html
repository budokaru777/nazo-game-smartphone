<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>美鈴の試練 - LANDSCAPE FIXED -</title>
    <style>
        /* 画面全体の絶対固定（スクロールやバウンスを強制禁止） */
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; background: #05020a;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        
        /* 📱 スマホの「横画面(100vh / 100vw)」に絶対100%収める超ワイドコンテナ */
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #160a2b 0%, #05020a 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 上部HUD（横画面用に左右にスッキリ配置して高さを最小化） */
        .hud-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
            z-index: 15;
            height: 40px;
            box-sizing: border-box;
            background: rgba(5, 2, 10, 0.6);
        }
        .hud-title-mini { font-size: 12px; color: #fef002; font-weight: 900; }
        .hud-cards { display: flex; }
        .hud-card {
            background: rgba(25, 15, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            padding: 2px 10px;
            text-align: center;
            margin-left: 10px;
            display: flex;
            align-items: center;
        }
        .hud-label { font-size: 9px; color: #8a99ad; font-weight: bold; margin-right: 5px; }
        .hud-value { font-size: 13px; font-family: monospace; font-weight: 900; color: #fff; }
        #scoreValue { color: #00ffff; }

        /* メインステージ（横画面用にパースペクティブを浅く調整） */
        .stage-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            perspective: 200px;
            perspective-origin: 50% 15%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .game-stage {
            width: 100%;
            height: 100%;
            transform: rotateX(15deg);
            transform-origin: top center;
            position: relative;
            background: linear-gradient(to bottom, rgba(5,2,15,0.95) 0%, rgba(15,8,35,0.7) 60%, rgba(35,12,70,0.2) 100%);
        }

        /* 4分割レーン */
        .lanes-container { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .lane { flex: 1; height: 100%; position: relative; border-right: 1px dashed rgba(0, 245, 255, 0.2); }
        .lane:last-child { border-right: none; }

        /* レーン発光（タップした時に一瞬明るくなる） */
        .lane-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0, 245, 255, 0.25) 0%, rgba(0, 245, 255, 0) 80%);
            opacity: 0; pointer-events: none; z-index: 1;
        }
        .lane-flash.active { opacity: 1; }

        /* 💎 横画面用の超高速サイバーノーツ */
        .note {
            position: absolute; width: 96%; left: 2%; height: 10px;
            border-radius: 2px; box-sizing: border-box; z-index: 2; pointer-events: none;
            background: linear-gradient(90deg, #00f5ff, #00e676);
            box-shadow: 0 0 8px rgba(0, 245, 255, 0.7), inset 0 0 2px #fff;
            border: 1px solid #fff;
        }

        /* ➖ ご要望①：4分割レーンの下にハッキリと引いた「横線（判定線）」 */
        .judgment-wire-line {
            position: absolute;
            bottom: 0px; /* ステージの最下部（＝当たり判定エリアとの境界）に完全に固定 */
            left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
            box-shadow: 0 0 12px #00f5ff, 0 0 20px #ff00ff;
            pointer-events: none; z-index: 5;
        }

        /* 🛑 ご要望②：横線から下すべてが「当たり判定（クリック領域）」になる独立パネル */
        .touch-control-panel {
            display: flex;
            width: 100%;
            height: 75px; /* 横画面の親指で非常に押し勝手の良い高さ */
            background: rgba(12, 6, 28, 0.9);
            border-top: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            box-sizing: border-box;
        }
        .tap-button {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
            background: rgba(0, 245, 255, 0.02);
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(0, 245, 255, 0.15);
        }
        .tap-button:last-child { border-right: none; }
        /* クリック＆タップ時の視覚フィードバック用 */
        .tap-button:active { background: rgba(0, 245, 255, 0.1); }

        /* 判定テキストエフェクト */
        .judgment-text {
            position: absolute; top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px; font-weight: 900; font-family: 'Impact', sans-serif;
            letter-spacing: 3px; pointer-events: none; z-index: 12; opacity: 0;
        }
        .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 15px #ff9800; animation: jAnim 0.18s ease-out forwards; }
        .judgment-text.great { color: #e1bee7; text-shadow: 0 0 8px #ba68c8, 0 0 15px #9c27b0; animation: jAnim 0.18s ease-out forwards; }
        .judgment-text.good { color: #b2dfdb; text-shadow: 0 0 8px #4db6ac; animation: jAnim 0.18s ease-out forwards; }
        .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: jAnim 0.18s ease-out forwards; }

        @keyframes jAnim {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
        }

        /* 全画面スクリーンマスク（SHADE） */
        .SHADE {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 15px; box-sizing: border-box;
            background: rgba(8, 4, 18, 0.98);
        }
        #GameScoreLayer { display: none; }

        /* UIデザイン・フォントスケール調整 */
        .game-title { font-size: 18px; color: #fef002; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 8px rgba(254,240,2,0.4); text-align: center; }
        .game-desc { font-size: 11px; color: #ccc; line-height: 1.4; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; text-align: center; width: 90%; box-sizing: border-box; }
        
        .btn-phone {
            width: 60%; max-width: 280px; padding: 10px; margin: 4px 0;
            font-size: 14px; font-weight: bold; color: #fff; border: none; border-radius: 20px;
            cursor: pointer; box-sizing: border-box; text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #0077ff); box-shadow: 0 0 10px rgba(0,245,255,0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15); }
        
        .result-stats-container { display: flex; width: 70%; justify-content: space-between; margin-bottom: 15px; }
        .result-row { font-size: 14px; color: #aaa; font-weight: bold; text-align: center; }
        .result-row span { display: block; color: #fff; font-family: monospace; font-size: 18px; margin-top: 4px; }

        #countText { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: 900; color: #00f5ff; text-shadow: 0 0 15px #00f5ff; z-index: 18; display: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud-area">
        <div class="hud-title-mini">美鈴の試練 - LANDSCAPE -</div>
        <div class="hud-cards">
            <div class="hud-card">
                <div class="hud-label">PROGRESS</div>
                <div class="hud-value"><span id="progressValue">0</span> / 100</div>
            </div>
            <div class="hud-card">
                <div class="hud-label">SCORE</div>
                <div class="hud-value"><span id="scoreValue">0</span> / 210</div>
            </div>
        </div>
    </div>

    <div class="stage-wrapper">
        <div class="game-stage" id="mainStage">
            
            <div class="judgment-text" id="judText">PERFECT</div>

            <div class="lanes-container">
                <div class="lane" id="lane0"><div class="lane-flash" id="flash0"></div></div>
                <div class="lane" id="lane1"><div class="lane-flash" id="flash1"></div></div>
                <div class="lane" id="lane2"><div class="lane-flash" id="flash2"></div></div>
                <div class="lane" id="lane3"><div class="lane-flash" id="flash3"></div></div>
            </div>

            <div class="judgment-wire-line"></div>
        </div>
    </div>

    <div class="touch-control-panel">
        <div class="tap-button" data-lane="0"></div>
        <div class="tap-button" data-lane="1"></div>
        <div class="tap-button" data-lane="2"></div>
        <div class="tap-button" data-lane="3"></div>
    </div>

    <div id="countText">3</div>

    <div id="welcome" class="SHADE">
        <div class="game-title">⚠️ 最終試練：美鈴の名前を呼び覚ませ！</div>
        <div class="game-desc">
            【スマートフォン横画面(Landscape)専用設計】<br>
            ※画面を横向きにしてプレイしてください。画面内にぴったり収まります。<br><br>
            奥から流れるノーツが<span style="color:#ff00ff; font-weight:bold;">中央のネオン横線</span>に重なった瞬間に、<br>
            <span style="color:#00f5ff; font-weight:bold;">横線よりも下のボタンエリア</span>をタイミングよくクリック・タップしてください！
        </div>
        <button class="btn-phone btn-primary" onclick="tapStart()">試練を開始する</button>
    </div>

    <div id="GameScoreLayer" class="SHADE">
        <div class="game-title" id="resTitle">STAGE CLEAR</div>
        <div class="game-desc" id="resComment">素晴らしい精度です！</div>
        
        <div class="result-stats-container">
            <div class="result-row">獲得スコア<span id="finalScore" style="color:#00ffff;">0</span></div>
            <div class="result-row">クリア基準<span>210</span></div>
            <div class="result-row">自己ベスト<span id="bestScore">0</span></div>
        </div>

        <button class="btn-phone btn-primary" onclick="tapReplay()">再挑戦する</button>
        <button class="btn-phone btn-secondary" onclick="window.location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
const TOTAL_NOTES = 100;
const TARGET_SCORE = 210;

let totalSpawned = 0;
let processedCount = 0;
let currentScore = 0;
let isPlaying = false;

let activeNotes = [];
let spawnInterval = null;
let animFrameId = null;

// 横画面に最適化した絶対座標
let stageHeight = 0;
const HIT_WINDOW_PERFECT = 18; // 横画面の圧縮率に合わせた判定幅調整
const HIT_WINDOW_GREAT = 38;
const HIT_WINDOW_GOOD = 55;

function tapStart() {
    document.getElementById('welcome').style.display = 'none';
    
    // 開始時に横画面の確定ステージ高さを取得
    stageHeight = document.getElementById('mainStage').clientHeight;
    
    startCountdown();
}

function startCountdown() {
    const countText = document.getElementById("countText");
    countText.style.display = "block";
    let count = 3;
    countText.innerText = count;

    const cd = setInterval(() => {
        count--;
        if (count > 0) {
            countText.innerText = count;
        } else if (count === 0) {
            countText.innerText = "START!";
        } else {
            clearInterval(cd);
            countText.style.display = "none";
            beginGamePlay();
        }
    }, 600);
}

function beginGamePlay() {
    isPlaying = true;
    totalSpawned = 0;
    processedCount = 0;
    currentScore = 0;
    activeNotes = [];

    document.getElementById("progressValue").innerText = "0";
    document.getElementById("scoreValue").innerText = "0";

    // 横画面を疾走する高密度ラッシュ生成（220ms間隔）
    spawnInterval = setInterval(() => {
        if (totalSpawned < TOTAL_NOTES) {
            spawnNote();
        } else {
            clearInterval(spawnInterval);
        }
    }, 220);

    animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
    if (!isPlaying) return;

    totalSpawned++;
    const laneIndex = Math.floor(Math.random() * 4);
    const targetLane = document.getElementById(`lane${laneIndex}`);

    const noteElement = document.createElement("div");
    noteElement.classList.add("note");
    noteElement.style.top = "-12px";
    targetLane.appendChild(noteElement);

    // 横画面の縦幅に対して、ダイナミックで叩きやすいスクロール速度を設定
    const speed = stageHeight * 0.038; 

    activeNotes.push({
        element: noteElement,
        lane: laneIndex,
        y: -12,
        speed: speed
    });
}

function updateNotes() {
    if (!isPlaying) return;

    for (let i = activeNotes.length - 1; i >= 0; i--) {
        const note = activeNotes[i];
        note.y += note.speed;
        note.element.style.top = note.y + "px";

        // 横線（ステージ最下部＝stageHeight）を超えて通り過ぎたらMISS
        if (note.y > stageHeight) {
            note.element.remove();
            activeNotes.splice(i, 1);
            
            showJudgment("MISS");
            processedCount++;
            document.getElementById("progressValue").innerText = processedCount;
            checkGameEnd();
        }
    }

    if (isPlaying) {
        animFrameId = requestAnimationFrame(updateNotes);
    }
}

// 🛑 横線の下をクリックした時に、寸分の狂いもなく発火する判定エンジン
function executeLaneTap(laneIndex) {
    if (!isPlaying) return;

    // レーンフラッシュ
    const flash = document.getElementById(`flash${laneIndex}`);
    flash.classList.remove("active");
    void flash.offsetWidth;
    flash.classList.add("active");
    setTimeout(() => { flash.classList.remove("active"); }, 60);

    let targetIndex = -1;
    let maxNoteY = -999;

    // レーン内で「最も横線に近い（y座標が一番大きい）」ノーツを正確にターゲット
    for (let i = 0; i < activeNotes.length; i++) {
        if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxNoteY) {
            maxNoteY = activeNotes[i].y;
            targetIndex = i;
        }
    }

    if (targetIndex !== -1) {
        const note = activeNotes[targetIndex];
        
        // 横線（stageHeight）との絶対距離でジャッジ
        const diff = Math.abs(note.y - stageHeight);

        if (diff <= HIT_WINDOW_PERFECT) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 3;
            showJudgment("PERFECT");
            pushProgress();
        } else if (diff <= HIT_WINDOW_GREAT) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 2;
            showJudgment("GREAT");
            pushProgress();
        } else if (diff <= HIT_WINDOW_GOOD) {
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            currentScore += 1;
            showJudgment("GOOD");
            pushProgress();
        }
    }
}

function pushProgress() {
    processedCount++;
    document.getElementById("progressValue").innerText = processedCount;
    document.getElementById("scoreValue").innerText = currentScore;
    checkGameEnd();
}

function checkGameEnd() {
    if (!isPlaying) return;

    if (processedCount >= TOTAL_NOTES) {
        isPlaying = false;
        clearInterval(spawnInterval);
        cancelAnimationFrame(animFrameId);

        let localBest = localStorage.getItem("misuzu_landscape_best") || 0;
        if (currentScore > localBest) {
            localBest = currentScore;
            localStorage.setItem("misuzu_landscape_best", localBest);
        }

        setTimeout(() => {
            const scoreLayer = document.getElementById("GameScoreLayer");
            const title = document.getElementById("resTitle");
            const comment = document.getElementById("resComment");

            document.getElementById("finalScore").innerText = currentScore;
            document.getElementById("bestScore").innerText = localBest;

            if (currentScore >= TARGET_SCORE) {
                title.innerText = "🎉 試練突破 !!";
                title.style.color = "#00f5ff";
                comment.innerHTML = "「美鈴……、美鈴っ！！」<br>横線の下で完璧に捉えられた言霊の光が、境界を越えて溢れ出す！";
            } else {
                title.innerText = "❌ 試練失敗";
                title.style.color = "#ff8a80";
                comment.innerText = "クリア基準（210点）に届きませんでした。横線を通過する瞬間、真下のエリアを確実に叩きましょう！";
            }

            scoreLayer.style.display = "flex";
        }, 400);
    }
}

function showJudgment(type) {
    const judText = document.getElementById("judText");
    judText.className = "judgment-text"; 
    judText.innerText = type;
    
    if (type === "PERFECT") judText.classList.add("perfect");
    else if (type === "GREAT") judText.classList.add("great");
    else if (type === "GOOD") judText.classList.add("good");
    else judText.classList.add("miss");
}

function tapReplay() {
    document.getElementById("GameScoreLayer").style.display = "none";
    startCountdown();
}

// 🛑 横線より下の全判定ボタンへイベントを超高感度アタッチ
document.querySelectorAll(".tap-button").forEach(btn => {
    const laneIndex = parseInt(btn.dataset.lane);
    
    // スマホでの指タップ（遅延0msの最速反応）
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    }, { passive: false });

    // PCのマウスクリック（テスト用）
    btn.addEventListener("mousedown", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    });
});
</script>

</body>
</html>
