<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>美鈴の試練 - PERFECT CHALLENGE -</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            overflow: hidden; background: #05020a;
            user-select: none; -webkit-user-select: none;
            touch-action: none;
        }
        
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #160a2b 0%, #05020a 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        /* 📊 上部HUD：ライフと進捗を大きく、分かりやすく */
        .hud-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
            z-index: 15;
            height: 45px;
            box-sizing: border-box;
            background: rgba(5, 2, 10, 0.7);
        }
        .hud-title-mini { font-size: 13px; color: #fef002; font-weight: 900; letter-spacing: 1px; }
        .hud-cards { display: flex; align-items: center; }
        .hud-card {
            background: rgba(25, 15, 45, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            padding: 4px 12px;
            text-align: center;
            margin-left: 10px;
            display: flex;
            align-items: center;
        }
        .hud-label { font-size: 10px; color: #8a99ad; font-weight: bold; margin-right: 6px; }
        .hud-value { font-size: 14px; font-family: monospace; font-weight: 900; color: #fff; }
        
        /* ❤️ ライフ表示用スタイリング */
        #lifeValue { font-size: 16px; letter-spacing: 2px; color: #ff1744; text-shadow: 0 0 8px rgba(255,23,68,0.6); }

        /* メイン演奏ステージ */
        .stage-wrapper {
            flex: 1;
            position: relative;
            width: 100%;
            perspective: 200px;
            perspective-origin: 50% 15%;
            box-sizing: border-box;
            overflow: hidden;
        }

        .game-stage {
            width: 100%;
            height: 100%;
            transform: rotateX(15deg);
            transform-origin: top center;
            position: relative;
            background: linear-gradient(to bottom, rgba(5,2,15,0.95) 0%, rgba(15,8,35,0.7) 60%, rgba(35,12,70,0.2) 100%);
        }

        /* 4分割レーン */
        .lanes-container { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .lane { flex: 1; height: 100%; position: relative; border-right: 1px dashed rgba(0, 245, 255, 0.2); }
        .lane:last-child { border-right: none; }

        .lane-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0, 245, 255, 0.25) 0%, rgba(0, 245, 255, 0) 80%);
            opacity: 0; pointer-events: none; z-index: 1;
        }
        .lane-flash.active { opacity: 1; }

        /* 💎 巨大化した「美鈴」文字入りサイバーブロック */
        .note {
            position: absolute; 
            width: 94%; 
            left: 3%; 
            height: 36px; /* 縦幅を約3倍以上に大幅巨大化！ */
            border-radius: 6px; 
            box-sizing: border-box; 
            z-index: 2; 
            pointer-events: none;
            background: linear-gradient(135deg, #00f5ff 0%, #00e676 100%);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.8), inset 0 0 6px #fff;
            border: 2px solid #fff;
            
            /* 文字をブロック中央に完全に配置 */
            display: flex;
            align-items: center;
            justify-content: center;
            color: #05020a;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0px 1px 1px rgba(255,255,255,0.8);
        }

        /* ➖ レーンの下に明確に引かれた横線（判定線） */
        .judgment-wire-line {
            position: absolute;
            bottom: 0px; 
            left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
            box-shadow: 0 0 14px #00f5ff, 0 0 22px #ff00ff;
            pointer-events: none; z-index: 5;
        }

        /* 🛑 横線から下すべてが当たり判定となる独立タップパネル */
        .touch-control-panel {
            display: flex;
            width: 100%;
            height: 80px; 
            background: rgba(12, 6, 28, 0.95);
            border-top: 2px solid rgba(255, 255, 255, 0.15);
            z-index: 10;
            box-sizing: border-box;
        }
        .tap-button {
            flex: 1;
            height: 100%;
            border-right: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
            background: rgba(0, 245, 255, 0.01);
            cursor: pointer;
            -webkit-tap-highlight-color: rgba(0, 245, 255, 0.2);
        }
        .tap-button:last-child { border-right: none; }
        .tap-button:active { background: rgba(0, 245, 255, 0.12); }

        /* 判定演出 */
        .judgment-text {
            position: absolute; top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px; font-weight: 900; font-family: 'Impact', sans-serif;
            letter-spacing: 4px; pointer-events: none; z-index: 12; opacity: 0;
        }
        .judgment-text.hit { color: #fff59d; text-shadow: 0 0 10px #ffeb3b, 0 0 20px #ff9800; animation: jAnim 0.18s ease-out forwards; }
        .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 10px #ff1744, 0 0 20px #ff1744; animation: jAnim 0.18s ease-out forwards; }

        @keyframes jAnim {
            0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
        }

        /* 全画面スクリーンマスク */
        .SHADE {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; padding: 15px; box-sizing: border-box;
            background: rgba(8, 4, 18, 0.98);
        }
        #GameScoreLayer { display: none; }

        .game-title { font-size: 18px; color: #fef002; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 8px rgba(254,240,2,0.4); text-align: center; }
        .game-desc { font-size: 12px; color: #ccc; line-height: 1.5; margin-bottom: 15px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; text-align: center; width: 85%; box-sizing: border-box; }
        
        .btn-phone {
            width: 60%; max-width: 260px; padding: 10px; margin: 4px 0;
            font-size: 14px; font-weight: bold; color: #fff; border: none; border-radius: 20px;
            cursor: pointer; box-sizing: border-box; text-align: center;
        }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #0077ff); box-shadow: 0 0 10px rgba(0,245,255,0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.15); }
        
        .result-stats-container { display: flex; width: 50%; justify-content: space-between; margin-bottom: 15px; }
        .result-row { font-size: 14px; color: #aaa; font-weight: bold; text-align: center; }
        .result-row span { display: block; color: #fff; font-family: monospace; font-size: 20px; margin-top: 4px; }

        #countText { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 55px; font-weight: 900; color: #00f5ff; text-shadow: 0 0 15px #00f5ff; z-index: 18; display: none; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div class="hud-area">
        <div class="hud-title-mini">美鈴の試練 - PERFECT MODE -</div>
        <div class="hud-cards">
            <div class="hud-card">
                <div class="hud-label">LIFE</div>
                <div id="lifeValue">❤️❤️</div>
            </div>
            <div class="hud-card">
                <div class="hud-label">BLOCK</div>
                <div class="hud-value"><span id="progressValue">0</span> / 100</div>
            </div>
        </div>
    </div>

    <div class="stage-wrapper">
        <div class="game-stage" id="mainStage">
            
            <div class="judgment-text" id="judText">HIT!</div>

            <div class="lanes-container">
                <div class="lane" id="lane0"><div class="lane-flash" id="flash0"></div></div>
                <div class="lane" id="lane1"><div class="lane-flash" id="flash1"></div></div>
                <div class="lane" id="lane2"><div class="lane-flash" id="flash2"></div></div>
                <div class="lane" id="lane3"><div class="lane-flash" id="flash3"></div></div>
            </div>

            <div class="judgment-wire-line"></div>
        </div>
    </div>

    <div class="touch-control-panel">
        <div class="tap-button" data-lane="0"></div>
        <div class="tap-button" data-lane="1"></div>
        <div class="tap-button" data-lane="2"></div>
        <div class="tap-button" data-lane="3"></div>
    </div>

    <div id="countText">3</div>

    <div id="welcome" class="SHADE">
        <div class="game-title">⚠️ 最終試練：美鈴の言霊をすべて紡げ！</div>
        <div class="game-desc">
            【横画面専用・パーフェクトチャレンジ】<br><br>
            巨大化した「美鈴ブロック」が中央のネオン横線に重なった瞬間、<br>
            <span style="color:#00f5ff; font-weight:bold;">横線よりも下のボタンエリア</span>を叩いてください！<br><br>
            全100個を<span style="color:#fef002; font-weight:bold;">すべて叩ければクリア！</span><br>
            ただし、空振りや見逃しを含めて<span style="color:#ff1744; font-weight:bold;">2回ミスしたら即ゲームオーバー</span>です。
        </div>
        <button class="btn-phone btn-primary" onclick="tapStart()">試練を開始する</button>
    </div>

    <div id="GameScoreLayer" class="SHADE">
        <div class="game-title" id="resTitle">STAGE CLEAR</div>
        <div class="game-desc" id="resComment">お見事です！</div>
        
        <div class="result-stats-container">
            <div class="result-row">叩いた数<span id="finalScore" style="color:#00ffff;">0</span></div>
            <div class="result-row">目標数<span>100</span></div>
        </div>

        <button class="btn-phone btn-primary" onclick="tapReplay()">再挑戦する</button>
        <button class="btn-phone btn-secondary" onclick="window.location.reload()">タイトルに戻る</button>
    </div>
</div>

<script>
const TOTAL_NOTES = 100;

let totalSpawned = 0;
let processedCount = 0;
let hitCount = 0;
let missCount = 0;
let isPlaying = false;

let activeNotes = [];
let spawnInterval = null;
let animFrameId = null;

let stageHeight = 0;

// ブロック巨大化に伴い、スマホで最高に快適に拾えるよう判定の遊び（幅）を大幅に拡大！
const HIT_WINDOW_RANGE = 55; 

function tapStart() {
    document.getElementById('welcome').style.display = 'none';
    stageHeight = document.getElementById('mainStage').clientHeight;
    startCountdown();
}

function startCountdown() {
    const countText = document.getElementById("countText");
    countText.style.display = "block";
    let count = 3;
    countText.innerText = count;

    const cd = setInterval(() => {
        count--;
        if (count > 0) {
            countText.innerText = count;
        } else if (count === 0) {
            countText.innerText = "START!";
        } else {
            clearInterval(cd);
            countText.style.display = "none";
            beginGamePlay();
        }
    }, 600);
}

function beginGamePlay() {
    isPlaying = true;
    totalSpawned = 0;
    processedCount = 0;
    hitCount = 0;
    missCount = 0;
    activeNotes = [];

    document.getElementById("progressValue").innerText = "0";
    updateLifeDisplay();

    // 流れてくるスピードを少しだけマイルドにし、文字をしっかり視認して叩ける速度に調整
    spawnInterval = setInterval(() => {
        if (totalSpawned < TOTAL_NOTES && isPlaying) {
            spawnNote();
        } else {
            clearInterval(spawnInterval);
        }
    }, 380);

    animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
    if (!isPlaying) return;

    totalSpawned++;
    const laneIndex = Math.floor(Math.random() * 4);
    const targetLane = document.getElementById(`lane${laneIndex}`);

    const noteElement = document.createElement("div");
    noteElement.classList.add("note");
    noteElement.innerText = "美鈴"; // ブロックの中央に文字を注入
    noteElement.style.top = "-40px"; // 巨大化したため初期位置を調整
    targetLane.appendChild(noteElement);

    const speed = stageHeight * 0.024; 

    activeNotes.push({
        element: noteElement,
        lane: laneIndex,
        y: -40,
        speed: speed
    });
}

function updateNotes() {
    if (!isPlaying) return;

    for (let i = activeNotes.length - 1; i >= 0; i--) {
        const note = activeNotes[i];
        note.y += note.speed;
        note.element.style.top = note.y + "px";

        // ブロックの下部が完全に横線を通り過ぎたら自動的にMISS判定
        if (note.y > stageHeight + 10) {
            note.element.remove();
            activeNotes.splice(i, 1);
            
            triggerMiss();
        }
    }

    if (isPlaying) {
        animFrameId = requestAnimationFrame(updateNotes);
    }
}

// 横線より下のエリアが押された時の判定
function executeLaneTap(laneIndex) {
    if (!isPlaying) return;

    const flash = document.getElementById(`flash${laneIndex}`);
    flash.classList.remove("active");
    void flash.offsetWidth;
    flash.classList.add("active");
    setTimeout(() => { flash.classList.remove("active"); }, 60);

    let targetIndex = -1;
    let maxNoteY = -999;

    // レーン内で最も手前（下）にある美鈴ブロックを探す
    for (let i = 0; i < activeNotes.length; i++) {
        if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxNoteY) {
            maxNoteY = activeNotes[i].y;
            targetIndex = i;
        }
    }

    if (targetIndex !== -1) {
        const note = activeNotes[targetIndex];
        // 巨大化したブロックの中心付近が横線(stageHeight)に近いかジャッジ
        const diff = Math.abs((note.y + 18) - stageHeight); 

        if (diff <= HIT_WINDOW_RANGE) {
            // 判定成功！
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            
            hitCount++;
            processedCount++;
            document.getElementById("progressValue").innerText = processedCount;
            showJudgment("HIT");
            checkGameEnd();
        } else {
            // 範囲外で叩いてしまった（空振り・早すぎ・遅すぎ）場合はMISS
            note.element.remove();
            activeNotes.splice(targetIndex, 1);
            triggerMiss();
        }
    } else {
        // ノーツが無いのに叩いた場合もミス扱い（ペナルティ）
        triggerMiss();
    }
}

// ミスが起きた時の共通処理
function triggerMiss() {
    missCount++;
    processedCount++;
    document.getElementById("progressValue").innerText = processedCount;
    showJudgment("MISS");
    updateLifeDisplay();

    // 2回ミスしたらその場でゲームオーバー
    if (missCount >= 2) {
        endGame(false);
    } else {
        checkGameEnd();
    }
}

function updateLifeDisplay() {
    const lifeValue = document.getElementById("lifeValue");
    if (missCount === 0) lifeValue.innerText = "❤️❤️";
    else if (missCount === 1) lifeValue.innerText = "❤️";
    else lifeValue.innerText = "❌";
}

function showJudgment(type) {
    const judText = document.getElementById("judText");
    judText.className = "judgment-text"; 
    judText.innerText = type === "HIT" ? "HIT!" : "MISS";
    
    if (type === "HIT") judText.classList.add("hit");
    else judText.classList.add("miss");
}

function checkGameEnd() {
    if (processedCount >= TOTAL_NOTES && missCount < 2) {
        endGame(true);
    }
}

function endGame(isSuccess) {
    isPlaying = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrameId);

    // 画面上の残ったブロックをきれいに掃除
    activeNotes.forEach(n => n.element.remove());
    activeNotes = [];

    setTimeout(() => {
        const scoreLayer = document.getElementById("GameScoreLayer");
        const title = document.getElementById("resTitle");
        const comment = document.getElementById("resComment");

        document.getElementById("finalScore").innerText = hitCount;

        if (isSuccess) {
            title.innerText = "🎉 試練完全突破 !!";
            title.style.color = "#00f5ff";
            comment.innerHTML = "「美鈴……、美鈴っ！！」<br>100個すべての言霊が完璧に紡がれた！ぬいぐるみから眩い光が解き放たれる！";
        } else {
            title.innerText = "❌ 試練失敗 (GAME OVER)";
            title.style.color = "#ff8a80";
            comment.innerText = "2回ミスしてしまいました。美鈴ブロックがネオン横線に重なる瞬間を、落ち着いて狙いましょう！";
        }

        scoreLayer.style.display = "flex";
    }, 400);
}

function tapReplay() {
    document.getElementById("GameScoreLayer").style.display = "none";
    startCountdown();
}

// 下部判定ボタンへイベント接続
document.querySelectorAll(".tap-button").forEach(btn => {
    const laneIndex = parseInt(btn.dataset.lane);
    
    btn.addEventListener("touchstart", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    }, { passive: false });

    btn.addEventListener("mousedown", (e) => {
        e.preventDefault();
        executeLaneTap(laneIndex);
    });
});
</script>

</body>
</html>
