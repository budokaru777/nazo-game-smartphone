<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名前を呼び覚ませ！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; overflow: hidden; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    position: relative;
  }

  h2 { color: #d32f2f; font-size: 15px; margin: 0 0 5px 0; font-weight: bold; }
  .game-status { font-size: 11px; color: #333; margin-bottom: 10px; line-height: 1.4; background: #ffebee; padding: 6px; border-radius: 8px; font-weight: bold; }
  
  /* HUD（情報表示エリア） */
  .hud-area {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    font-weight: bold;
  }
  .hud-item {
    background: #263238;
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    flex: 1;
    margin: 0 4px;
    box-shadow: 0 3px 0 #10171a;
  }
  .hud-item span { color: #ffeb3b; font-size: 15px; }
  #scoreLabel { color: #00e5ff; }

  /* ゲームステージ（4レーンの音ゲー筐体） */
  .game-stage {
    width: 100%;
    height: 400px;
    background: linear-gradient(to bottom, #050510, #101025);
    border: 3px solid #d32f2f;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 25px rgba(211,47,47,0.4);
    margin-bottom: 10px;
    user-select: none;
    touch-action: none;
  }

  /* 4つのレーンを区切る線 */
  .lanes-container {
    display: flex;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0; left: 0;
  }
  .lane {
    flex: 1;
    height: 100%;
    border-right: 1px dashed rgba(255, 255, 255, 0.15);
    position: relative;
    box-sizing: border-box;
  }
  .lane:last-child { border-right: none; }

  /* プロセカ風の判定ライン（最下部付近） */
  .judgment-line {
    position: absolute;
    bottom: 50px;
    left: 0;
    width: 100%;
    height: 4px;
    background: linear-gradient(90deg, #00ffff, #00e5ff);
    box-shadow: 0 0 12px #00ffff;
    pointer-events: none;
    z-index: 3;
  }

  /* レーン最下部のタップエリア */
  .lane-trigger {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100px; 
    background: rgba(255, 255, 255, 0.02);
    z-index: 4;
    cursor: pointer;
  }
  .lane-trigger:active, .lane-trigger.active {
    background: linear-gradient(to top, rgba(0, 229, 255, 0.3), rgba(0, 229, 255, 0));
  }

  /* 降ってくるノーツ（ブロック） */
  .note {
    position: absolute;
    width: 90%;
    left: 5%;
    height: 26px;
    border-radius: 6px;
    text-align: center;
    line-height: 24px;
    font-size: 11px;
    font-weight: bold;
    box-sizing: border-box;
    z-index: 2;
    box-shadow: 0 3px 6px rgba(0,0,0,0.4);
    pointer-events: none;
    background: linear-gradient(135deg, #00e676, #00b0ff);
    border: 2px solid #fff;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  /* 各種判定エフェクトテキスト */
  .judgment-text {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    font-size: 28px;
    font-weight: 900;
    font-style: italic;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
  }
  .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 15px #ffeb3b; animation: judAnim 0.25s ease-out forwards; }
  .judgment-text.great { color: #e1bee7; text-shadow: 0 0 8px #ba68c8; animation: judAnim 0.25s ease-out forwards; }
  .judgment-text.good { color: #b2dfdb; text-shadow: 0 0 8px #4db6ac; animation: judAnim 0.25s ease-out forwards; }
  .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: judAnim 0.25s ease-out forwards; }

  @keyframes judAnim {
    0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
    30% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.0); opacity: 0; }
  }

  /* 開始前カウントダウンマスク */
  .start-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 20;
    border-radius: 9px;
  }
  .start-btn {
    padding: 15px 40px;
    background: #4caf50;
    color: white;
    font-size: 20px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    box-shadow: 0 5px 0 #2e7d32;
    cursor: pointer;
  }
  .start-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #2e7d32; }
  .count-num { color: #fff; font-size: 60px; font-weight: bold; display: none; }
</style>
</head>
<body>

<div class="content-box">
  <h2>⚠️ 最終試練：美鈴の名前を呼び覚ませ！</h2>
  <div class="game-status">
    【判定】Perf:3点 / Grt:2点 / Gd:1点<br>
    全100個の「美鈴」が流れる間に<span style="color:#d32f2f;">210点以上</span>を叩き出せ！
  </div>

  <div class="hud-area">
    <div class="hud-item">PROGRESS: <span id="progressLabel">0</span> / 100</div>
    <div class="hud-item">SCORE: <span id="scoreLabel">0</span> / 210</div>
  </div>

  <div class="game-stage" id="gameStage">
    <div class="start-overlay" id="overlay">
      <button class="start-btn" id="startBtn" onclick="startGame()">試練に挑む</button>
      <div class="count-num" id="countText">3</div>
    </div>

    <div class="judgment-text" id="judText">PERFECT</div>

    <div class="lanes-container">
      <div class="lane" id="lane0"><div class="lane-trigger" data-lane="0"></div></div>
      <div class="lane" id="lane1"><div class="lane-trigger" data-lane="1"></div></div>
      <div class="lane" id="lane2"><div class="lane-trigger" data-lane="2"></div></div>
      <div class="lane" id="lane3"><div class="lane-trigger" data-lane="3"></div></div>
    </div>
    
    <div class="judgment-line"></div>
  </div>
</div>

<script>
let totalSpawned = 0; 
let processedCount = 0; 
let currentScore = 0;     
const TARGET_SCORE = 210; // クリアに必要な最低スコア
const TOTAL_NOTES = 100;  // ノーツ総数を100個に変更

let isPlaying = false;
let spawnInterval = null;
let activeNotes = [];
let animFrameId = null;

const JUDGE_LINE_Y = 346; 

function startGame() {
  document.getElementById("startBtn").style.display = "none";
  const countText = document.getElementById("countText");
  countText.style.display = "block";
  
  let count = 3;
  countText.innerText = count;
  
  const cd = setInterval(() => {
    count--;
    if (count > 0) {
      countText.innerText = count;
    } else if (count === 0) {
      countText.innerText = "START!!";
    } else {
      clearInterval(cd);
      document.getElementById("overlay").style.display = "none";
      beginMainGame();
    }
  }, 800);
}

function beginMainGame() {
  isPlaying = true;
  totalSpawned = 0;
  processedCount = 0;
  currentScore = 0;
  activeNotes = [];
  
  document.getElementById("progressLabel").innerText = "0";
  document.getElementById("scoreLabel").innerText = "0";

  // 出現間隔は超高速（230ミリ秒ごと）
  spawnInterval = setInterval(() => {
    if (totalSpawned < TOTAL_NOTES) {
      spawnNote();
    } else {
      clearInterval(spawnInterval);
    }
  }, 230);

  animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
  if (!isPlaying) return;

  totalSpawned++;
  const laneIndex = Math.floor(Math.random() * 4);
  const targetLane = document.getElementById(`lane${laneIndex}`);

  const noteElement = document.createElement("div");
  noteElement.classList.add("note");
  noteElement.innerText = "美鈴";

  let yPos = -30;
  noteElement.style.top = `${yPos}px`;
  targetLane.appendChild(noteElement);

  // 落下スピードは超神速の「11.2」
  const speed = 11.2; 

  activeNotes.push({
    element: noteElement,
    lane: laneIndex,
    y: yPos,
    speed: speed
  });
}

function updateNotes() {
  if (!isPlaying) return;

  for (let i = activeNotes.length - 1; i >= 0; i--) {
    const note = activeNotes[i];
    note.y += note.speed;
    note.element.style.top = `${note.y}px`;

    // 判定ラインを通り過ぎて完全に画面外に落ちた場合＝MISS
    if (note.y > 400) {
      note.element.remove();
      activeNotes.splice(i, 1);
      
      showJudgment("MISS");
      processedCount++;
      document.getElementById("progressLabel").innerText = processedCount;
      checkGameEnd();
    }
  }
  
  if (isPlaying) {
    animFrameId = requestAnimationFrame(updateNotes);
  }
}

function judgeTap(laneIndex) {
  if (!isPlaying) return;

  let targetNoteIndex = -1;
  let maxY = -999;

  for (let i = 0; i < activeNotes.length; i++) {
    if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxY) {
      maxY = activeNotes[i].y;
      targetNoteIndex = i;
    }
  }

  if (targetNoteIndex !== -1) {
    const note = activeNotes[targetNoteIndex];
    const diff = Math.abs(note.y - (JUDGE_LINE_Y - 13)); 

    // 【新仕様】当たり判定の距離(最大70px)に応じて細かく点数を分岐
    if (diff <= 24) {
      // ドンピシャ：PERFECT (3点)
      note.element.remove();
      activeNotes.splice(targetNoteIndex, 1);
      currentScore += 3;
      showJudgment("PERFECT");
      nextProgress();
    } else if (diff <= 48) {
      // ややズレ：GREAT (2点)
      note.element.remove();
      activeNotes.splice(targetNoteIndex, 1);
      currentScore += 2;
      showJudgment("GREAT");
      nextProgress();
    } else if (diff <= 70) {
      // 大きくズレ：GOOD (1点)
      note.element.remove();
      activeNotes.splice(targetNoteIndex, 1);
      currentScore += 1;
      showJudgment("GOOD");
      nextProgress();
    }
  }
}

function nextProgress() {
  processedCount++;
  document.getElementById("progressLabel").innerText = processedCount;
  document.getElementById("scoreLabel").innerText = currentScore;
  checkGameEnd();
}

function checkGameEnd() {
  if (!isPlaying) return;

  // 100個すべてのノーツを流しきった（処理しきった）段階で最終スコア判定
  if (processedCount >= TOTAL_NOTES) {
    isPlaying = false;
    clearInterval(spawnInterval);
    cancelAnimationFrame(animFrameId);

    setTimeout(() => {
      if (currentScore >= TARGET_SCORE) {
        alert(`【試練突破!!】\n最終スコア: ${currentScore}点 / 210点\n最高精度のリズムで見事に名前を呼び覚ました！\n\n「美鈴……、美鈴っ！！」\n完璧に紡がれた名前の言霊が完全に響き渡り、ぬいぐるみから眩い光が溢れ出す！`);
        location.href = "restore.html";
      } else {
        alert(`【試練失敗…】\n最終スコア: ${currentScore}点\nクリア基準の210点に届きませんでした（あと${TARGET_SCORE - currentScore}点）。\nより正確に中心を狙ってタップしましょう！`);
        location.reload();
      }
    }, 150);
  }
}

function showJudgment(type) {
  const judText = document.getElementById("judText");
  judText.className = "judgment-text"; 
  judText.innerText = type;
  
  if (type === "PERFECT") {
    judText.classList.add("perfect");
  } else if (type === "GREAT") {
    judText.classList.add("great");
  } else if (type === "GOOD") {
    judText.classList.add("good");
  } else {
    judText.classList.add("miss");
  }
}

document.querySelectorAll(".lane-trigger").forEach(trigger => {
  const laneIndex = parseInt(trigger.dataset.lane);

  const handler = (e) => {
    e.preventDefault();
    trigger.classList.add("active");
    judgeTap(laneIndex);
    setTimeout(() => trigger.classList.remove("active"), 80);
  };

  trigger.addEventListener("touchstart", handler, { passive: false });
  trigger.addEventListener("mousedown", handler);
});
</script>

</body>
</html>
