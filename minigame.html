<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>名前を呼び覚ませ！</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; overflow: hidden; }
  body { background: url("haikei.jpg") no-repeat center top/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 15px; border-radius: 20px; text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    position: relative;
  }

  h2 { color: #d32f2f; font-size: 16px; margin: 0 0 5px 0; font-weight: bold; }
  .game-status { font-size: 12px; color: #333; margin-bottom: 10px; line-height: 1.4; background: #ffebee; padding: 6px; border-radius: 8px; font-weight: bold; }
  
  /* カウンター表示 */
  .counter-display { font-size: 20px; color: #ffb300; margin: 5px 0; letter-spacing: 3px; font-weight: bold; }

  /* ゲーム画面（名前が流れるエリア） */
  .game-stage {
    width: 100%;
    height: 350px;
    background: #111122;
    border: 3px solid #d32f2f;
    border-radius: 12px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(211,47,47,0.5);
    margin-bottom: 10px;
  }

  /* 流れてくる名前のオブジェクト */
  .falling-name {
    position: absolute;
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid #333;
    border-radius: 20px;
    font-size: 14px;
    font-weight: bold;
    color: #000;
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
    touch-action: none;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  /* 正解をタップしたときのエフェクト */
  @keyframes hitEffect {
    0% { transform: scale(1); opacity: 1; background: #75ef66; }
    100% { transform: scale(1.5); opacity: 0; }
  }
  .hit { animation: hitEffect 0.3s forwards; pointer-events: none; }
</style>
</head>
<body>

<div class="content-box">
  <h2>⚠️ 最終試練：正しい名前を撃破せよ！</h2>
  <div class="game-status">
    流れてくる名前から<span style="color:#d32f2f;">「秦谷」「美鈴」</span>だけを狙って<br>【連続5回】正しくタップしてください！偽物はスルー！
  </div>

  <div class="counter-display" id="starCounter">☆☆☆☆☆</div>

  <div class="game-stage" id="gameStage"></div>
</div>

<script>
let callCount = 0;
const stage = document.getElementById("gameStage");
let gameInterval;
let isGameOver = false;

// 出現させる名前のリスト
const correctNames = ["秦谷", "美鈴"];
const dummyNames = ["泰谷", "秦の谷", "美寿々", "美鈴々", "ハタヤ", "ミスズ", "秦名", "三鈴"];

// 名前オブジェクトを生成して降らせる関数
function createFallingName() {
  if (isGameOver) return;

  const nameObj = document.createElement("div");
  nameObj.classList.add("falling-name");

  // 正解かダミーかをランダムで決定（50%の確率）
  const isCorrect = Math.random() < 0.5;
  if (isCorrect) {
    nameObj.innerText = correctNames[Math.floor(Math.random() * correctNames.length)];
    nameObj.dataset.correct = "true";
    nameObj.style.borderColor = "#2e7d32"; // 正解はうっすら緑枠
  } else {
    nameObj.innerText = dummyNames[Math.floor(Math.random() * dummyNames.length)];
    nameObj.dataset.correct = "false";
    nameObj.style.borderColor = "#c62828"; // ダミーはうっすら赤枠
  }

  // 出現時の横位置をランダムに設定（はみ出さないように調整）
  stage.appendChild(nameObj);
  const stageWidth = stage.clientWidth;
  const objWidth = nameObj.clientWidth || 60;
  const randomX = Math.random() * (stageWidth - objWidth - 10) + 5;
  nameObj.style.left = `${randomX}px`;

  // 初期位置（上端の外側）とランダムな落下速度
  let currentY = -40;
  nameObj.style.top = `${currentY}px`;
  const speed = Math.random() * 2 + 2; // 落ちる速さ

  // タッチ・クリック時のイベント
  const handleTap = (e) => {
    e.preventDefault();
    if (isGameOver) return;

    if (nameObj.dataset.correct === "true") {
      // 正解をタップした場合
      callCount++;
      nameObj.classList.add("hit");
      updateStars();

      if (callCount >= 5) {
        isGameOver = true;
        clearInterval(gameInterval);
        setTimeout(() => {
          alert("「……、……っ！！」\n正しい名前の言霊が響き渡り、ぬいぐるみが光りだした！");
          location.href = "restore.html"; // 演出ページへ
        }, 400);
      }
    } else {
      // 偽物をタップしてしまった場合
      alert("「うわっ！」偽物の名前に惑わされて呪いの力が逆流した！\n(カウントがリセットされます)");
      callCount = 0;
      updateStars();
      nameObj.remove();
    }
  };

  nameObj.addEventListener("mousedown", handleTap);
  nameObj.addEventListener("touchstart", handleTap, {passive: false});

  // 落下のアニメーションループ
  function moveDown() {
    if (isGameOver) {
      nameObj.remove();
      return;
    }
    currentY += speed;
    nameObj.style.top = `${currentY}px`;

    // 画面の一番下まで落ちた場合
    if (currentY > stage.clientHeight) {
      // 正解スルー時はペナルティなし（見送るのが正解）、そのまま消去
      nameObj.remove();
    } else {
      requestAnimationFrame(moveDown);
    }
  }
  requestAnimationFrame(moveDown);
}

// 星カウンターの表示更新
function updateStars() {
  let stars = "";
  for (let i = 0; i < 5; i++) {
    stars += (i < callCount) ? "★" : "☆";
  }
  document.getElementById("starCounter").innerText = stars;
}

// 0.8秒ごとに新しい名前を上から降らせる
gameInterval = setInterval(createFallingName, 800);
</script>

</body>
</html>
