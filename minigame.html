<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0, width=device-width" />
    <title>最終試練：美鈴の名前を呼び覚ませ！</title>
    <style>
        /* レイアウト・基盤スタイル */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Helvetica Neue', Arial, sans-serif; overflow: hidden; background: #000; }
        body { display: flex; justify-content: center; align-items: center; }
        
        #gameBody {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #05020a 100%);
            box-shadow: 0 0 35px rgba(138, 43, 226, 0.4);
            overflow: hidden;
        }

        /* HUD・上部ステータス表示 */
        .hud-top {
            position: absolute;
            top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between;
            z-index: 15; pointer-events: none;
        }
        .hud-item {
            background: rgba(20, 15, 35, 0.85); color: #8a99ad; padding: 8px 12px; border-radius: 10px; 
            font-size: 12px; flex: 1; margin: 0 5px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
        .hud-item span { color: #fff; font-size: 16px; font-family: monospace; font-weight: bold; }
        #scoreLabel { color: #00ffff; text-shadow: 0 0 8px rgba(0,255,255,0.8); }

        /* 3D遠近感ゲームステージ構造 */
        #GameLayerBG {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            perspective: 150px; perspective-origin: 50% 20%;
        }
        .stage-transform {
            width: 100%; height: 100%;
            transform: rotateX(22deg); transform-origin: top center;
            position: relative; border-left: 3px solid #00f5ff; border-right: 3px solid #00f5ff;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.2);
            background: linear-gradient(to bottom, rgba(5, 2, 15, 0.9) 0%, rgba(20, 10, 40, 0.6) 70%, rgba(40, 15, 80, 0.4) 100%);
        }

        /* 4レーン構造 */
        .lanes-container { display: flex; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .lane { flex: 1; height: 100%; position: relative; border-right: 1px solid rgba(0, 245, 255, 0.15); }
        .lane:last-child { border-right: none; }

        /* タップ時に光るフラッシュ演出 */
        .lane-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0, 245, 255, 0.25), rgba(0, 245, 255, 0));
            opacity: 0; pointer-events: none; z-index: 1;
        }
        .lane-flash.active { opacity: 1; }

        /* プロセカ風判定ライン */
        .judgment-line {
            position: absolute; bottom: 85px; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #00f5ff, #ff00ff, #00f5ff);
            box-shadow: 0 0 15px #00f5ff, 0 0 30px #ff00ff;
            pointer-events: none; z-index: 3;
        }

        /* 下部タップ用トリガーエリア */
        .lane-trigger { position: absolute; bottom: 0; left: 0; width: 100%; height: 140px; z-index: 4; cursor: pointer; }

        /* 落下するノーツ（美鈴） */
        .note {
            position: absolute; width: 92%; left: 4%; height: 16px;
            border-radius: 4px; box-sizing: border-box; z-index: 2; pointer-events: none;
            background: linear-gradient(90deg, #00f5ff, #00e676);
            box-shadow: 0 0 12px rgba(0, 245, 255, 0.8), inset 0 0 4px #fff;
            border: 1px solid #fff;
        }

        /* 判定エフェクトテキスト */
        .judgment-text {
            position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%);
            font-size: 34px; font-weight: 900; font-family: 'Impact', sans-serif;
            letter-spacing: 2px; pointer-events: none; z-index: 10; opacity: 0;
        }
        .judgment-text.perfect { color: #fff59d; text-shadow: 0 0 8px #ffeb3b, 0 0 20px #ff9800; animation: judAnim 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .judgment-text.great { color: #e1bee7; text-shadow: 0 0 8px #ba68c8, 0 0 20px #9c27b0; animation: judAnim 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .judgment-text.good { color: #b2dfdb; text-shadow: 0 0 8px #4db6ac; animation: judAnim 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .judgment-text.miss { color: #ff8a80; text-shadow: 0 0 8px #ff1744; animation: judAnim 0.25s ease-in forwards; }

        @keyframes judAnim {
            0% { transform: translate(-50%, -50%) scale(0.4) rotate(-5deg); opacity: 0; }
            40% { transform: translate(-50%, -50%) scale(1.2) rotate(2deg); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.0) rotate(0deg); opacity: 0; }
        }

        /* メニュー・スクリーンマスク（SHADE）ベース */
        .SHADE {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 20; box-sizing: border-box; padding: 20px;
        }
        #welcome { background: rgba(10, 5, 20, 0.95); text-align: center; }
        #GameScoreLayer { background: rgba(5, 2, 15, 0.95); text-align: center; display: none; }

        /* UIパーツデザイン */
        .game-title { font-size: 24px; color: #fef002; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 10px rgba(254,240,2,0.5); }
        .game-desc { font-size: 14px; color: #fff; line-height: 1.6; margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; }
        
        .btn-custom {
            width: 80%; max-width: 250px; padding: 12px; margin: 8px 0;
            font-size: 16px; font-weight: bold; color: #fff; border: none; border-radius: 25px;
            cursor: pointer; transition: transform 0.1s, box-shadow: 0.1s;
        }
        .btn-primary { background: linear-gradient(135deg, #00f5ff, #00a3ff); box-shadow: 0 0 15px rgba(0,245,255,0.4); }
        .btn-secondary { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2); }
        .btn-custom:active { transform: scale(0.95); }

        /* リザルト表示用数字 */
        .result-stat { font-size: 18px; color: #fff; margin: 10px 0; display: flex; justify-content: space-between; width: 60%; }
        .result-stat span { color: #00ffff; font-family: monospace; font-weight: bold; }

        /* カウントダウン表示 */
        #countText { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 65px; font-weight: 900; color: #00f5ff; text-shadow: 0 0 20px #00f5ff; z-index: 18; display: none; }
    </style>
</head>
<body>

<div id="gameBody">
    <!-- 上部HUDエリア -->
    <div class="hud-top">
        <div class="hud-item">PROGRESS: <span id="progressLabel">0</span> / 100</div>
        <div class="hud-item">SCORE: <span id="scoreLabel">0</span> / 210</div>
    </div>

    <!-- 3Dゲームステージ -->
    <div id="GameLayerBG">
        <div class="stage-transform" id="stageTrack">
            <!-- 判定テキスト -->
            <div class="judgment-text" id="judText">PERFECT</div>

            <!-- 4つのレーン -->
            <div class="lanes-container">
                <div class="lane" id="lane0">
                    <div class="lane-flash" id="flash0"></div>
                    <div class="lane-trigger" data-lane="0"></div>
                </div>
                <div class="lane" id="lane1">
                    <div class="lane-flash" id="flash1"></div>
                    <div class="lane-trigger" data-lane="1"></div>
                </div>
                <div class="lane" id="lane2">
                    <div class="lane-flash" id="flash2"></div>
                    <div class="lane-trigger" data-lane="2"></div>
                </div>
                <div class="lane" id="lane3">
                    <div class="lane-flash" id="flash3"></div>
                    <div class="lane-trigger" data-lane="3"></div>
                </div>
            </div>

            <!-- プロセカ風判定ライン -->
            <div class="judgment-line"></div>
        </div>
    </div>

    <!-- カウントダウンテキスト -->
    <div id="countText">3</div>

    <!-- メニュー画面（ウェルカムレイヤー） -->
    <div id="welcome" class="SHADE">
        <div class="game-title">⚠️ 最終試練：美鈴の名前を呼び覚ませ！</div>
        <div class="game-desc">
            【プロセカ風新概念立体音ゲー】<br><br>
            超神速で降る100個のノーツを処理せよ！<br>
            Perf: 3点 / Grt: 2点 / Gd: 1点<br>
            クリア基準: <span style="color:#00f5ff; font-weight:bold;">210点以上</span><br><br>
            キーボードサポート: <span style="color:#fef002; font-weight:bold;">D F J K</span> に対応
        </div>
        <button class="btn-custom btn-primary" onclick="readyBtn()">試練に挑む</button>
    </div>

    <!-- リザルト画面（スコアレイヤー） -->
    <div id="GameScoreLayer" class="SHADE">
        <div class="game-title" id="resultTitle">STAGE CLEAR</div>
        <div class="game-desc" id="resultComment">素晴らしいリズム精度です！</div>
        
        <div class="result-stat">SCORE: <span id="resScore">0</span></div>
        <div class="result-stat">TARGET: <span>210</span></div>
        <div class="result-stat">MAX BEST: <span id="resBest">0</span></div>

        <button class="btn-custom btn-primary" onclick="replayBtn()" style="margin-top:20px;">AGAIN</button>
        <button class="btn-custom btn-secondary" onclick="window.location.reload()">HOME</button>
    </div>
</div>

<script>
// 設定変数（雷普先輩のロジックに準拠）
const TOTAL_NOTES = 100;
const TARGET_SCORE = 210;
const KEY_MAP = {'d': 0, 'f': 1, 'j': 2, 'k': 3}; // DFJK入力

let totalSpawned = 0;
let processedCount = 0;
let currentScore = 0;
let isPlaying = false;
let welcomeLayerClosed = false;

let activeNotes = [];
let spawnInterval = null;
let animFrameId = null;

// ステージの高さ設定に基づく内部Y座標
const TRACK_HEIGHT = window.innerHeight;
const JUDGE_LINE_Y = TRACK_HEIGHT - 135; // 画面下部からのオフセット調整
const HIT_WINDOW = 70; // 判定最大幅

// 起動時初期化
window.onload = function() {
    // キーボードリスナー登録（雷普先輩スタイル）
    document.onkeydown = function (e) {
        if (!welcomeLayerClosed || !isPlaying) return;
        let key = e.key.toLowerCase();
        if (KEY_MAP[key] !== undefined) {
            click(KEY_MAP[key]);
        }
    }
}

function readyBtn() {
    welcomeLayerClosed = true;
    document.getElementById('welcome').style.display = 'none';
    startCountdown();
}

function startCountdown() {
    const countText = document.getElementById("countText");
    countText.style.display = "block";
    let count = 3;
    countText.innerText = count;

    const cd = setInterval(() => {
        count--;
        if (count > 0) {
            countText.innerText = count;
        } else if (count === 0) {
            countText.innerText = "START!!";
        } else {
            clearInterval(cd);
            countText.style.display = "none";
            beginMainGame();
        }
    }, 700);
}

function beginMainGame() {
    isPlaying = true;
    totalSpawned = 0;
    processedCount = 0;
    currentScore = 0;
    activeNotes = [];

    document.getElementById("progressLabel").innerText = "0";
    document.getElementById("scoreLabel").innerText = "0";

    // 高密度230ms間隔での生成
    spawnInterval = setInterval(() => {
        if (totalSpawned < TOTAL_NOTES) {
            spawnNote();
        } else {
            clearInterval(spawnInterval);
        }
    }, 230);

    animFrameId = requestAnimationFrame(updateNotes);
}

function spawnNote() {
    if (!isPlaying) return;

    totalSpawned++;
    const laneIndex = Math.floor(Math.random() * 4);
    const targetLane = document.getElementById(`lane${laneIndex}`);

    const noteElement = document.createElement("div");
    noteElement.classList.add("note");
    noteElement.style.top = "-20px";
    targetLane.appendChild(noteElement);

    const speed = 11.5; // 雷普先輩の超高速を再現

    activeNotes.push({
        element: noteElement,
        lane: laneIndex,
        y: -20,
        speed: speed
    });
}

function updateNotes() {
    if (!isPlaying) return;

    for (let i = activeNotes.length - 1; i >= 0; i--) {
        const note = activeNotes[i];
        note.y += note.speed;
        note.element.style.top = note.y + "px";

        // 判定線を通り過ぎて完全に落ちた場合 = MISS
        if (note.y > TRACK_HEIGHT) {
            note.element.remove();
            activeNotes.splice(i, 1);
            
            showJudgment("MISS");
            processedCount++;
            document.getElementById("progressLabel").innerText = processedCount;
            checkGameEnd();
        }
    }

    if (isPlaying) {
        animFrameId = requestAnimationFrame(updateNotes);
    }
}

// タップおよびキーボード入力からの統合判定関数
function click(laneIndex) {
    if (!isPlaying) return;

    // レーンフラッシュアニメーションのトリガー
    const flash = document.getElementById(`flash${laneIndex}`);
    flash.classList.remove("active");
    void flash.offsetWidth; // リフローを発生させてアニメーション再起動
    flash.style.opacity = "1";
    setTimeout(() => { flash.style.opacity = "0"; }, 100);

    // 該当レーンで最も下にあるノーツを検索
    let targetNoteIndex = -1;
    let maxY = -999;
    for (let i = 0; i < activeNotes.length; i++) {
        if (activeNotes[i].lane === laneIndex && activeNotes[i].y > maxY) {
            maxY = activeNotes[i].y;
            targetNoteIndex = i;
        }
    }

    if (targetNoteIndex !== -1) {
        const note = activeNotes[targetNoteIndex];
        const diff = Math.abs(note.y - JUDGE_LINE_Y);

        // 各種ズレ幅に応じて3・2・1点判定
        if (diff <= 25) {
            note.element.remove();
            activeNotes.splice(targetNoteIndex, 1);
            currentScore += 3;
            showJudgment("PERFECT");
            nextProgress();
        } else if (diff <= 50) {
            note.element.remove();
            activeNotes.splice(targetNoteIndex, 1);
            currentScore += 2;
            showJudgment("GREAT");
            nextProgress();
        } else if (diff <= HIT_WINDOW) {
            note.element.remove();
            activeNotes.splice(targetNoteIndex, 1);
            currentScore += 1;
            showJudgment("GOOD");
            nextProgress();
        }
    }
}

function nextProgress() {
    processedCount++;
    document.getElementById("progressLabel").innerText = processedCount;
    document.getElementById("scoreLabel").innerText = currentScore;
    checkGameEnd();
}

function checkGameEnd() {
    if (!isPlaying) return;

    if (processedCount >= TOTAL_NOTES) {
        isPlaying = false;
        clearInterval(spawnInterval);
        cancelAnimationFrame(animFrameId);

        // ハイスコア処理（ローカルストレージ使用）
        let bestScore = localStorage.getItem("misuzu_best") || 0;
        if (currentScore > bestScore) {
            bestScore = currentScore;
            localStorage.setItem("misuzu_best", bestScore);
        }

        setTimeout(() => {
            const scoreLayer = document.getElementById("GameScoreLayer");
            const title = document.getElementById("resultTitle");
            const comment = document.getElementById("resultComment");

            document.getElementById("resScore").innerText = currentScore;
            document.getElementById("resBest").innerText = bestScore;

            if (currentScore >= TARGET_SCORE) {
                title.innerText = "試練突破!!";
                title.style.color = "#00f5ff";
                comment.innerHTML = "「美鈴……、美鈴っ！！」<br>紡がれた名前の言霊が響き渡り、眩い光が溢れ出す！";
            } else {
                title.innerText = "試練失敗...";
                title.style.color = "#ff8a80";
                comment.innerText = "クリア基準の210点に届きませんでした。判定線に引きつけて正確に叩き込みましょう！";
            }

            scoreLayer.style.display = "flex";
        }, 300);
    }
}

function showJudgment(type) {
    const judText = document.getElementById("judText");
    judText.className = "judgment-text"; 
    judText.innerText = type;
    
    if (type === "PERFECT") judText.classList.add("perfect");
    else if (type === "GREAT") judText.classList.add("great");
    else if (type === "GOOD") judText.classList.add("good");
    else judText.classList.add("miss");
}

function replayBtn() {
    document.getElementById("GameScoreLayer").style.display = "none";
    startCountdown();
}

// マウス＆スマホタッチ用トリガーイベント一括設定
document.querySelectorAll(".lane-trigger").forEach(trigger => {
    const laneIndex = parseInt(trigger.dataset.lane);
    const handler = (e) => {
        e.preventDefault();
        click(laneIndex);
    };
    trigger.addEventListener("touchstart", handler, { passive: false });
    trigger.addEventListener("mousedown", handler);
});
</script>

</body>
</html>
