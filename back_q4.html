<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>正解 - アクセス成功</title>
<style>
  body { margin: 0; height: 100vh; background: url("haikei.jpg") no-repeat center/cover; display: flex; justify-content: center; align-items: center; font-family: sans-serif; }
  .box { background: rgba(255, 255, 255, 0.95); padding: 30px 20px; border-radius: 20px; text-align: center; width: 85%; max-width: 360px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
  
  h2 { color: #2e7d32; font-size: 22px; margin-top: 0; margin-bottom: 20px; }
  .clear-img { width: 80px; height: auto; margin-bottom: 20px; }
  
  .info-text { font-size: 14px; color: #333; line-height: 1.6; margin-bottom: 25px; }

  /* 企画資料を見るための特別ボタン */
  .view-doc-btn { 
    display: block; width: 100%; padding: 18px; margin-bottom: 15px;
    background: #1b5e20; color: white; border: none; border-radius: 12px;
    font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none;
    box-shadow: 0 4px 0 #0a3311; box-sizing: border-box;
  }
  .view-doc-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #0a3311; }

  /* 漫画へ戻るボタン（通常デザイン） */
  .next-btn { 
    width: 100%; padding: 14px; font-size: 14px; font-weight: bold; 
    background: #607d8b; color: white; border: none; border-radius: 12px; 
    cursor: pointer; outline: none; transition: opacity 0.2s;
  }
</style>
</head>
<body>

<div class="box">
  <img src="クリア画面.png" class="clear-img" alt="正解">
  <h2>ACCESS GRANTED</h2>
  
  <p class="info-text">
    パソコンのロックを解除しました。<br>
    生徒会の極秘ドライブへアクセス可能です。
  </p>

  <a href="view_document.html" class="view-doc-btn">📁 企画立案資料を閲覧する</a>

  <button class="next-btn" onclick="goNext()">本誌（資料一覧）に戻る</button>
</div>

<script>
function goNext() {
  // 進行度を謎5に進める
  let prog = parseInt(localStorage.getItem("gameProgress") || 1);
  if (prog <= 4) {
    localStorage.setItem("gameProgress", 5);
  }
  location.href = "documents.html";
}
</script>

</body>
</html>
