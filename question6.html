<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料6</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; position: fixed; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; display: flex; justify-content: center; align-items: flex-start; }
  
  .content-box { 
    width: 90%; 
    max-width: 380px; 
    background: rgba(255, 255, 255, 0.95); 
    padding: 20px 15px; 
    border-radius: 20px; 
    text-align: center; 
    margin-top: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    box-sizing: border-box;
  }

  .q-title { font-size: 18px; font-weight: bold; color: #1a237e; margin-bottom: 5px; text-align: left; }
  .q-text { font-size: 15px; color: #333; text-align: left; margin-bottom: 25px; background: #f5f5f5; padding: 12px; border-radius: 8px; line-height: 1.5; font-weight: bold; }

  /* ヒントセクション（右寄せ） */
  .hint-section { 
    display: flex; 
    flex-direction: column; 
    gap: 12px; 
    text-align: right;
  }

  .hint-row { 
    display: flex; 
    flex-direction: row-reverse; 
    align-items: center; 
    gap: 10px; 
    justify-content: flex-start;
  }

  .hint-icon { 
    width: 45px; 
    height: 45px; 
    border-radius: 50%; 
    background: #fff; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    flex-shrink: 0;
    border: 1px solid #ccc;
    overflow: hidden;
  }
  .hint-icon img { width: 100%; height: 100%; object-fit: cover; }

  .hint-btn { 
    flex: 1; 
    max-width: 130px;
    padding: 10px; 
    border: 2px solid #607d8b; 
    border-radius: 8px; 
    background: white; 
    color: #607d8b; 
    font-size: 13px; 
    font-weight: bold; 
    cursor: pointer; 
  }

  .bubble-msg { 
    display: none; 
    background: #75ef66; 
    padding: 8px 12px; 
    border-radius: 12px; 
    font-size: 12px; 
    color: #000; 
    position: relative; 
    max-width: 140px;
    line-height: 1.3;
    text-align: left;
  }
  .bubble-msg::before {
    content: ""; position: absolute; right: -10px; top: 12px;
    border: 5px solid transparent; border-left: 10px solid #75ef66;
  }

  .ans-row { margin-top: 5px; }
  .ans-btn { width: 100%; background: #d32f2f !important; color: white !important; border: none !important; padding: 12px; border-radius: 8px; }

  .back-menu-btn {
    display: block; width: 100%; padding: 12px; margin-top: 15px;
    background: #333; color: white; border: none; border-radius: 8px;
    font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none;
    box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="content-box">
  <div class="q-title">謎６</div>
  <div class="q-text">問題文：<br>ぬいぐるみになった生徒を戻すために必要な処置は？<br><br>「 ＿＿＿ を ＿＿＿ ＿＿＿ 」</div>

  <div class="hint-section">
    <div class="hint-row">
      <div class="hint-icon"><img src="riha.png" alt="riha"></div>
      <button class="hint-btn" onclick="showBubble('h1')">ヒント1を見る</button>
      <div id="h1" class="bubble-msg">富士井さんの情報と言えば生徒会室にあった企画資料くらいだよね...そこに気になることはないかな？</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon"><img src="hiro.png" alt="hiro"></div>
      <button class="hint-btn" onclick="showBubble('h2')">ヒント2を見る</button>
      <div id="h2" class="bubble-msg">企画資料のDMの写真IDが映ってる...プロデューサー、調べてみて。</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon"><img src="seinan.png" alt="seinan"></div>
      <button class="hint-btn" onclick="showBubble('h3')">ヒント3を見る</button>
      <div id="h3" class="bubble-msg">SNSに上がってる音声と写真から千奈が間違えて入れたものがいつ使われたかわからないかしら？耳を澄ませてみましょう！</div>
    </div>

    <div class="ans-row">
      <button class="hint-btn ans-btn" onclick="askAnswer()">答えを見る</button>
    </div>
  </div>

  <button class="back-menu-btn" onclick="location.href='index.html'">メニューに戻して回答する</button>
</div>

<script>
// 直前ページ情報を保存
localStorage.setItem("returnPage", "question6.html");

function showBubble(id) {
  document.querySelectorAll('.bubble-msg').forEach(b => b.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function askAnswer() {
  if(confirm("答えを見ますか？")) {
    alert("答えは「名前 を 5回 呼ぶ」です！");
  }
}
</script>

</body>
</html>
