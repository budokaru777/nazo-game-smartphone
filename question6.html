<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料6</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 15px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; max-width: 380px; background: rgba(255, 255, 255, 0.95); 
    padding: 20px 15px; border-radius: 20px; text-align: center; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3); box-sizing: border-box;
    max-height: 95vh; overflow-y: auto;
  }

  .q-title { font-size: 18px; font-weight: bold; color: #1a237e; margin-bottom: 5px; text-align: left; }
  .q-text { font-size: 15px; color: #333; text-align: left; margin-bottom: 15px; background: #f5f5f5; padding: 12px; border-radius: 8px; line-height: 1.5; font-weight: bold; }

  .answer-puzzle-area { background: #f5f5f5; border: 2px solid #333; border-radius: 15px; padding: 12px 10px; margin-bottom: 20px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); }
  .input-label { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 8px; text-align: left; padding-left: 5px; }
  
  .slots-container { display: flex; align-items: center; justify-content: space-between; background: #b0bec5; padding: 8px; border-radius: 10px; margin-bottom: 12px; gap: 4px; }
  .slot { flex: 1; height: 45px; background: rgba(255,255,255,0.7); border: 2px dashed #455a64; border-radius: 8px; display: flex; justify-content: center; align-items: center; }
  .fixed-text { font-size: 14px; font-weight: bold; color: #263238; padding: 0 2px; white-space: nowrap; }
  
  .pool { background: #cfd8dc; padding: 8px; border-radius: 12px; margin-bottom: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; min-height: 100px; }
  .chip { background: #fff; border: 2px solid #455a64; border-radius: 8px; padding: 8px 0; font-size: 12px; font-weight: bold; color: #263238; cursor: grab; box-shadow: 0 3px 0 #b0bec5; touch-action: none; user-select: none; text-align: center; width: 100%; box-sizing: border-box; }
  .chip:active { cursor: grabbing; }

  .submit-large-btn { width: 100%; padding: 12px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 3px 0 #1b5e20; margin-bottom: 5px; }
  .submit-large-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1b5e20; }

  .hint-section { display: flex; flex-direction: column; gap: 12px; text-align: right; }
  .hint-row { display: flex; flex-direction: row-reverse; align-items: center; gap: 10px; justify-content: flex-start; }
  .hint-icon { width: 45px; height: 45px; border-radius: 50%; background: #fff; display: flex; justify-content: center; align-items: center; flex-shrink: 0; border: 1px solid #ccc; overflow: hidden; }
  .hint-icon img { width: 100%; height: 100%; object-fit: cover; }
  .hint-btn { flex: 1; max-width: 130px; padding: 10px; border: 2px solid #607d8b; border-radius: 8px; background: white; color: #607d8b; font-size: 13px; font-weight: bold; cursor: pointer; }

  .bubble-msg { display: none; background: #75ef66; padding: 8px 12px; border-radius: 12px; font-size: 12px; color: #000; position: relative; max-width: 140px; line-height: 1.3; text-align: left; }
  .bubble-msg::before { content: ""; position: absolute; right: -10px; top: 12px; border: 5px solid transparent; border-left: 10px solid #75ef66; }

  .ans-row { margin-top: 5px; }
  .ans-btn { width: 100%; background: #d32f2f !important; color: white !important; border: none !important; padding: 12px; border-radius: 8px; }
  .back-menu-btn { display: block; width: 100%; padding: 12px; margin-top: 15px; background: #333; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box; }
</style>
</head>
<body>

<div class="content-box">
  <div class="q-title">謎６</div>
  <div class="q-text">問題文：<br>ぬいぐるみの呪いを解く正しい方法を並べ替えてください</div>

  <div class="answer-puzzle-area">
    <div class="input-label">🧩 パーツを枠内にドラッグして並べてください：</div>
    
    <div class="slots-container" id="slotsArea">
      <div class="slot" id="slot1"></div>
      <div class="fixed-text">を</div>
      <div class="slot" id="slot2"></div>
      <div class="slot" id="slot3"></div>
    </div>
    
    <div class="pool" id="ansPool">
      <div class="chip" draggable="true">頭</div>
      <div class="chip" draggable="true">お湯</div>
      <div class="chip" draggable="true">名前</div>
      <div class="chip" draggable="true">10回</div>
      <div class="chip" draggable="true">全体に</div>
      <div class="chip" draggable="true">5回</div>
      <div class="chip" draggable="true">呼ぶ</div>
      <div class="chip" draggable="true">なでる</div>
      <div class="chip" draggable="true">かける</div>
    </div>
    
    <button class="submit-large-btn" onclick="checkPuzzleAnswer()">この並びで決定する</button>
  </div>

  <div class="hint-section">
    <div class="hint-row">
      <div class="hint-icon"><img src="hiro.png" alt="hiro"></div>
      <button class="hint-btn" onclick="showBubble('h1')">ヒント1を見る</button>
      <div id="h1" class="bubble-msg">企画書に書いてある方法はダミーだよ。正しい方法は、動画の中に…</div>
    </div>
    <div class="hint-row">
      <div class="hint-icon"><img src="seinan.png" alt="seinan"></div>
      <button class="hint-btn" onclick="showBubble('h2')">ヒント2を見る</button>
      <div id="h2" class="bubble-msg">動画の最初のノイズの中に、うっすら文字が見える箇所がないかしら？</div>
    </div>
    <div class="hint-row">
      <div class="hint-icon"><img src="riha.png" alt="riha"></div>
      <button class="hint-btn" onclick="showBubble('h3')">ヒント3を見る</button>
      <div id="h3" class="bubble-msg">「なまえ」「ごかい」「よぶ」って見えたような気がする！</div>
    </div>
    <div class="ans-row">
      <button class="hint-btn ans-btn" onclick="askAnswer()">答えを見る</button>
    </div>
  </div>

  <button class="back-menu-btn" onclick="location.href='index.html'">メニューに戻る</button>
</div>

<script>
localStorage.setItem("returnPage", "question6.html");

function checkPuzzleAnswer() {
  const s1 = document.getElementById("slot1");
  const s2 = document.getElementById("slot2");
  const s3 = document.getElementById("slot3");
  
  let t1 = s1.children.length > 0 ? s1.children[0].innerText : "";
  let t2 = s2.children.length > 0 ? s2.children[0].innerText : "";
  let t3 = s3.children.length > 0 ? s3.children[0].innerText : "";

  let finalAns = t1 + t2 + t3;

  if (finalAns === "名前5回呼ぶ") {
    // ★ パズル正解：ミニゲームページ（minigame.html）へ進む
    location.href = "minigame.html";
  } else {
    location.href = "fail.html";
  }
}

function showBubble(id) {
  document.querySelectorAll('.bubble-msg').forEach(b => b.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function askAnswer() {
  if(confirm("答えを見ますか？")) {
    alert("答えは「名前」を「5回」「呼ぶ」の順番です！");
  }
}

let dragged = null;
document.addEventListener("dragstart", e => { if(e.target.classList.contains("chip")) { dragged = e.target; } });
document.addEventListener("dragover", e => e.preventDefault());
document.addEventListener("drop", e => {
  e.preventDefault();
  const slot = e.target.closest(".slot");
  const pool = e.target.closest("#ansPool");
  if(slot && slot.children.length === 0) { slot.appendChild(dragged); }
  else if(pool) { pool.appendChild(dragged); }
});
document.addEventListener("touchstart", e => { if(e.target.classList.contains("chip")) { dragged = e.target; } }, {passive:true});
document.addEventListener("touchend", e => {
  if(!dragged) return;
  const touch = e.changedTouches[0];
  const target = document.elementFromPoint(touch.clientX, touch.clientY);
  const slot = target ? target.closest(".slot") : null;
  if(slot && slot.children.length === 0) { slot.appendChild(dragged); }
  else { document.getElementById("ansPool").appendChild(dragged); }
  dragged = null;
});
</script>
</body>
</html>
