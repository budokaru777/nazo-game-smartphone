<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>資料4</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; font-family: sans-serif; }
  body { background: url("haikei.jpg") no-repeat center -95px/cover; background-attachment: fixed; display: flex; justify-content: center; align-items: flex-start; padding: 15px 10px; box-sizing: border-box; }
  
  .content-box { 
    width: 100%; 
    max-width: 380px; 
    background: rgba(255, 255, 255, 0.95); 
    padding: 20px 15px; 
    border-radius: 20px; 
    text-align: center; 
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    box-sizing: border-box;
    max-height: 95vh;
    overflow-y: auto;
  }

  .q-title { font-size: 18px; font-weight: bold; color: #1a237e; margin-bottom: 5px; text-align: left; }
  .q-text { font-size: 15px; color: #333; text-align: left; margin-bottom: 15px; background: #f5f5f5; padding: 10px; border-radius: 8px; line-height: 1.4; font-weight: bold; }

  /* 指定されたPCの画像表示エリア */
  .pc-img { width: 100%; max-width: 280px; height: auto; margin-bottom: 15px; border-radius: 10px; }

  /* 【新設】解答入力エリアのスタイル */
  .answer-input-area {
    background: #f5f5f5; border: 2px solid #333; border-radius: 15px;
    padding: 12px 10px; margin-bottom: 20px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
  }
  .input-label { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; text-align: left; padding-left: 5px; }
  .input-row { display: flex; justify-content: center; gap: 8px; }
  #answerInput { flex: 1; height: 42px; font-size: 16px; border: 2px solid #555; border-radius: 10px; text-align: center; outline: none; }
  .ok-btn { width: 70px; height: 42px; background: #2e7d32; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; box-shadow: 0 3px 0 #1b5e20; }
  .ok-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1b5e20; }

  /* ヒントセクション（右寄せ） */
  .hint-section { display: flex; flex-direction: column; gap: 10px; text-align: right; }
  .hint-row { display: flex; flex-direction: row-reverse; align-items: center; gap: 8px; justify-content: flex-start; }
  
  .hint-icon { 
    width: 42px; height: 42px; border-radius: 50%; background: #fff; 
    display: flex; justify-content: center; align-items: center; flex-shrink: 0;
    border: 1px solid #ccc; overflow: hidden;
  }
  .hint-icon img { width: 100%; height: 100%; object-fit: cover; }

  .hint-btn { 
    flex: 1; max-width: 120px; padding: 9px; border: 2px solid #607d8b; 
    border-radius: 8px; background: white; color: #607d8b; font-size: 12px; font-weight: bold; cursor: pointer; 
  }

  .bubble-msg { 
    display: none; background: #75ef66; padding: 8px 12px; border-radius: 12px; 
    font-size: 11px; color: #000; position: relative; max-width: 140px; line-height: 1.3; text-align: left;
  }
  .bubble-msg::before {
    content: ""; position: absolute; right: -10px; top: 12px;
    border: 5px solid transparent; border-left: 10px solid #75ef66;
  }

  .ans-row { margin-top: 5px; }
  .ans-btn { width: 100%; background: #d32f2f !important; color: white !important; border: none !important; padding: 10px; border-radius: 8px; font-size: 13px; }

  .back-menu-btn {
    display: block; width: 100%; padding: 11px; margin-top: 10px;
    background: #333; color: white; border: none; border-radius: 8px;
    font-size: 13px; font-weight: bold; cursor: pointer; text-decoration: none; box-sizing: border-box;
  }
</style>
</head>
<body>

<div class="content-box">
  <div class="q-title">謎４</div>
  <div class="q-text">問題文：<br>パスワードを入力してください</div>

  <img src="pc.png" class="pc-img" alt="パソコン画面の資料">

  <div class="answer-input-area">
    <div class="input-label">🔑 パスワードを入力してください：</div>
    <div class="input-row">
      <input id="answerInput" type="text" placeholder="キーワードを入力">
      <button class="ok-btn" onclick="checkAnswer()">OK</button>
    </div>
  </div>

  <div class="hint-section">
    <div class="hint-row">
      <div class="hint-icon"><img src="seinan.png" alt="seinan"></div>
      <button class="hint-btn" onclick="showBubble('h1')">ヒント1を見る</button>
      <div id="h1" class="bubble-msg">この曲名、全部何か足りないわね…</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon"><img src="riha.png" alt="riha"></div>
      <button class="hint-btn" onclick="showBubble('h2')">ヒント2を見る</button>
      <div id="h2" class="bubble-msg">足りない記号と暗号が一致するなら「！」が「★+ぬ」ってことかな…？</div>
    </div>

    <div class="hint-row">
      <div class="hint-icon"><img src="hiro.png" alt="hiro"></div>
      <button class="hint-btn" onclick="showBubble('h3')">ヒント3を見る</button>
      <div id="h3" class="bubble-msg">暗号のひらがなはキーボードに対応してるのかも。「！」を入力するときは「ぬ」のキーとどこを一緒に押す？</div>
    </div>

    <div class="ans-row">
      <button class="hint-btn ans-btn" onclick="askAnswer()">答えを見る</button>
    </div>
  </div>

  <button class="back-menu-btn" onclick="location.href='index.html'">メニューに戻る</button>
</div>

<script>
localStorage.setItem("returnPage", "question4.html");

// 【新設】答えの判定ロジック
function checkAnswer() {
  const input = document.getElementById('answerInput').value.trim();
  
  // 複数パターンの正解判定に対応
  if (input === "shift" || input === "SHIFT" || input === "!") {
    // 正解：進行度を「5」にして謎4専用のback_q4.htmlへ遷移
    localStorage.setItem("gameProgress", "5");
    location.href = "back_q4.html";
  } else {
    // 不正解：fail.htmlへ遷移
    location.href = "fail.html";
  }
}

function showBubble(id) {
  document.querySelectorAll('.bubble-msg').forEach(b => b.style.display = 'none');
  document.getElementById(id).style.display = 'block';
}

function askAnswer() {
  if(confirm("答えを見ますか？")) {
    alert("答えは「shift（!）」です！");
  }
}
</script>

</body>
</html>
